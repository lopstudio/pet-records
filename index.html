<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Health Log</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f3ee; color: #2c2c2a; min-height: 100vh; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* Header */
.app-header { background: #fff; border-bottom: 0.5px solid #d3d1c7; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.app-title { font-size: 1.05rem; font-weight: 600; color: #2c2c2a; display: flex; align-items: center; gap: 10px; }
.app-title .paw { width: 28px; height: 28px; background: #e1f5ee; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.header-actions { display: flex; gap: 8px; }

/* Layout */
.container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
.layout { display: grid; grid-template-columns: 220px 1fr; gap: 1.5rem; align-items: start; }

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 0.75rem; position: sticky; top: 70px; }
.sidebar-section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #888780; padding: 0 0.5rem; margin-bottom: 0.1rem; }
.pet-tab { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; padding: 0.75rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.15s; width: 100%; text-align: left; }
.pet-tab:hover { border-color: #b4b2a9; background: #faf9f7; }
.pet-tab.active { border-color: #1d9e75; background: #e1f5ee; }
.pet-tab .pet-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.pet-tab-name { font-size: 14px; font-weight: 600; color: #2c2c2a; }
.pet-tab-sub { font-size: 12px; color: #888780; }
.pet-tab.active .pet-tab-name { color: #0f6e56; }
.add-pet-btn { border: 0.5px dashed #b4b2a9; border-radius: 10px; padding: 0.75rem 1rem; cursor: pointer; display: flex; align-items: center; gap: 8px; color: #5f5e5a; font-size: 13px; background: transparent; width: 100%; transition: 0.15s; }
.add-pet-btn:hover { background: #fff; border-color: #888780; color: #2c2c2a; }
.stats-box { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 10px; padding: 1rem; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid #f1efe8; }
.stat-row:last-child { border-bottom: none; }
.stat-lbl { font-size: 11px; color: #888780; }
.stat-num { font-size: 18px; font-weight: 700; color: #2c2c2a; }

/* Main area */
.main { display: flex; flex-direction: column; gap: 1.25rem; }

/* Welcome */
.welcome { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 4rem 2rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.welcome-icon { font-size: 3.5rem; }
.welcome h2 { font-size: 1.3rem; font-weight: 600; color: #2c2c2a; }
.welcome p { color: #888780; font-size: 13px; max-width: 320px; line-height: 1.7; }

/* Pet header card */
.pet-header-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 1.5rem; display: flex; align-items: flex-start; gap: 1.25rem; }
.pet-header-avatar { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
.pet-header-info { flex: 1; min-width: 0; }
.pet-name-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.pet-name { font-size: 1.25rem; font-weight: 600; color: #2c2c2a; }
.pet-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
.badge-cat { background: #faeeda; color: #633806; }
.badge-dog { background: #e6f1fb; color: #0c447c; }
.badge-rabbit { background: #fbeaf0; color: #72243e; }
.badge-bird { background: #eeedfe; color: #3c3489; }
.badge-other { background: #f1efe8; color: #5f5e5a; }
.pet-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
.meta-item { font-size: 13px; color: #5f5e5a; }
.meta-item strong { color: #2c2c2a; font-weight: 500; }
.meta-chip { background: #f1efe8; border-radius: 6px; padding: 4px 10px; font-size: 12px; color: #5f5e5a; }
.alert-chip { background: #fcebeb; color: #791f1f; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 500; }
.hdr-btn-group { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.edit-pet-btn { background: #f5f3ee; border: 0.5px solid #d3d1c7; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: #2c2c2a; cursor: pointer; transition: 0.15s; }
.edit-pet-btn:hover { background: #eeeae0; }
.del-pet-btn { background: #fff5f5; border: 0.5px solid #f7c1c1; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: #a32d2d; cursor: pointer; transition: 0.15s; }
.del-pet-btn:hover { background: #fcebeb; }

/* Section card */
.section-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; overflow: hidden; }
.section-tabs { display: flex; gap: 4px; padding: 0.75rem 1.25rem; border-bottom: 0.5px solid #d3d1c7; overflow-x: auto; scrollbar-width: none; }
.section-tabs::-webkit-scrollbar { display: none; }
.stab { padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 0.5px solid transparent; color: #5f5e5a; cursor: pointer; background: none; white-space: nowrap; transition: 0.1s; }
.stab:hover { background: #f1efe8; }
.stab.active { background: #e1f5ee; color: #0f6e56; border-color: #9fe1cb; }
.section-header { padding: 1rem 1.25rem; border-bottom: 0.5px solid #f1efe8; display: flex; align-items: center; justify-content: space-between; }
.section-title { font-size: 14px; font-weight: 600; color: #2c2c2a; display: flex; align-items: center; gap: 8px; }
.section-icon { width: 24px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
.icon-green { background: #eaf3de; }
.icon-blue { background: #e6f1fb; }
.icon-amber { background: #faeeda; }
.icon-teal { background: #e1f5ee; }
.icon-coral { background: #faece7; }
.icon-purple { background: #eeedfe; }
.add-row-btn { font-size: 12px; color: #1d9e75; background: none; border: none; cursor: pointer; padding: 4px 10px; border-radius: 6px; display: flex; align-items: center; gap: 4px; font-weight: 500; transition: 0.1s; }
.add-row-btn:hover { background: #e1f5ee; }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { padding: 8px 1.25rem; background: #f5f3ee; text-align: left; font-weight: 500; color: #5f5e5a; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid #d3d1c7; white-space: nowrap; }
.data-table td { padding: 10px 1.25rem; border-bottom: 0.5px solid #f1efe8; color: #2c2c2a; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #fafaf8; }
.td-sub { font-size: 11px; color: #888780; margin-top: 2px; }
.row-actions { display: flex; gap: 4px; opacity: 0; transition: 0.1s; }
.data-table tr:hover .row-actions { opacity: 1; }
.ra-btn { background: none; border: none; cursor: pointer; padding: 3px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; color: #5f5e5a; transition: 0.1s; }
.ra-btn:hover { background: #f1efe8; }
.ra-btn.del:hover { background: #fcebeb; color: #a32d2d; }

/* Pills */
.pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-green { background: #eaf3de; color: #3b6d11; }
.pill-amber { background: #faeeda; color: #854f0b; }
.pill-red { background: #fcebeb; color: #a32d2d; }
.pill-blue { background: #e6f1fb; color: #185fa5; }
.pill-gray { background: #f1efe8; color: #5f5e5a; }
.pill-purple { background: #eeedfe; color: #3c3489; }

/* Notes */
.notes-grid { padding: 1rem 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
.note-item { background: #f5f3ee; border-radius: 8px; padding: 0.75rem 1rem; border-left: 3px solid #d3d1c7; position: relative; }
.note-item.note-concern { border-left-color: #ef9f27; background: #fff8ee; }
.note-item.note-good { border-left-color: #639922; background: #f2fae8; }
.note-date { font-size: 11px; color: #888780; margin-bottom: 4px; }
.note-text { font-size: 13px; color: #2c2c2a; line-height: 1.55; }
.note-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 3px; opacity: 0; transition: 0.1s; }
.note-item:hover .note-actions { opacity: 1; }

/* Weight */
.weight-section { padding: 1rem 1.25rem; }
.weight-range-hint { font-size: 12px; color: #888780; margin-bottom: 1rem; }
.weight-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.weight-label { font-size: 12px; color: #5f5e5a; width: 64px; text-align: right; flex-shrink: 0; }
.weight-bar-wrap { flex: 1; background: #f1efe8; border-radius: 4px; height: 20px; overflow: hidden; }
.weight-bar { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 500; color: #fff; transition: width 0.4s; min-width: 32px; }
.bar-teal { background: #1d9e75; }
.bar-blue { background: #378add; }
.weight-val { font-size: 12px; color: #2c2c2a; width: 55px; flex-shrink: 0; }
.weight-wactions { display: flex; gap: 2px; opacity: 0; transition: 0.1s; }
.weight-bar-row:hover .weight-wactions { opacity: 1; }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 0.75rem; margin-top: 1.25rem; }
.metric-card { background: #f5f3ee; border-radius: 8px; padding: 0.75rem 1rem; }
.mc-label { font-size: 11px; color: #888780; margin-bottom: 4px; }
.mc-value { font-size: 20px; font-weight: 600; color: #2c2c2a; margin-bottom: 2px; }
.mc-sub { font-size: 11px; }

/* Contacts */
.contacts-grid { padding: 1rem 1.25rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; }
.contact-card { background: #f5f3ee; border-radius: 8px; padding: 0.75rem 1rem; position: relative; }
.contact-type { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; color: #888780; margin-bottom: 4px; }
.contact-name { font-size: 13px; font-weight: 600; color: #2c2c2a; margin-bottom: 2px; }
.contact-phone { font-size: 12px; color: #1d9e75; font-weight: 500; margin-bottom: 2px; }
.contact-note { font-size: 11px; color: #888780; }
.contact-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 3px; opacity: 0; transition: 0.1s; }
.contact-card:hover .contact-actions { opacity: 1; }

/* Tips */
.tips-section { background: #e1f5ee; border: 0.5px solid #5dcaa5; border-radius: 12px; padding: 1.25rem; }
.tips-title { font-size: 13px; font-weight: 600; color: #085041; margin-bottom: 0.75rem; }
.tips-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.5rem; }
.tip-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: #0f6e56; }
.tip-icon { color: #1d9e75; font-weight: 700; flex-shrink: 0; margin-top: 1px; }

/* Backup banner */
.backup-banner { background: #fff8ee; border: 0.5px solid #f5c475; border-radius: 10px; padding: 0.75rem 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; font-size: 12px; color: #633806; }

/* Empty state */
.empty-state { padding: 2.5rem; text-align: center; color: #b4b2a9; font-size: 13px; }
.empty-state .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; }

/* Buttons */
.btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 0.5px solid #d3d1c7; background: #fff; color: #2c2c2a; cursor: pointer; transition: 0.15s; }
.btn:hover { background: #f5f3ee; }
.btn-primary { background: #1d9e75; border-color: #1d9e75; color: #fff; }
.btn-primary:hover { background: #0f6e56; }
.btn-danger { background: #e24b4a; border-color: #e24b4a; color: #fff; }
.btn-danger:hover { background: #a32d2d; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid #f1efe8; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: #fff; z-index: 1; }
.modal-title { font-size: 15px; font-weight: 700; color: #2c2c2a; }
.modal-close { background: #f5f3ee; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; line-height: 1; }
.modal-close:hover { background: #e8e5de; }
.modal-body { padding: 1.5rem; }
.modal-footer { padding: 1rem 1.5rem; border-top: 0.5px solid #f1efe8; display: flex; justify-content: flex-end; gap: 8px; }

/* Forms */
.form-grid { display: grid; gap: 1rem; }
.form-2 { grid-template-columns: 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-group.span2 { grid-column: span 2; }
label { font-size: 12px; font-weight: 600; color: #5f5e5a; }
.req { color: #e24b4a; }
input[type=text], input[type=date], input[type=number], input[type=tel], select, textarea { width: 100%; padding: 8px 12px; border: 0.5px solid #d3d1c7; border-radius: 8px; font-size: 13px; color: #2c2c2a; background: #fff; outline: none; transition: border 0.1s; }
input:focus, select:focus, textarea:focus { border-color: #1d9e75; box-shadow: 0 0 0 3px rgba(29,158,117,0.1); }
textarea { resize: vertical; min-height: 78px; line-height: 1.5; }
.hint { font-size: 11px; color: #888780; }
.emoji-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.emoji-opt { width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid #d3d1c7; background: #f5f3ee; font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
.emoji-opt:hover { border-color: #9fe1cb; }
.emoji-opt.sel { border-color: #1d9e75; background: #e1f5ee; }
.color-picker { display: flex; gap: 10px; flex-wrap: wrap; padding: 2px 0; }
.color-opt { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: 0.15s; }
.color-opt.sel { border-color: #2c2c2a; transform: scale(1.15); }
.confirm-icon { font-size: 2.5rem; text-align: center; margin-bottom: 0.75rem; }
.confirm-msg { text-align: center; color: #5f5e5a; font-size: 14px; line-height: 1.65; margin-bottom: 1.25rem; }

@media (max-width: 700px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .form-2 { grid-template-columns: 1fr; }
  .form-group.span2 { grid-column: span 1; }
}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title"><div class="paw">🐾</div>Pet Health Log</div>
  <div class="header-actions">
    <button class="btn btn-sm" onclick="document.getElementById('importInput').click()">⬆ Import backup</button>
    <button class="btn btn-sm" onclick="exportData()">⬇ Export backup</button>
    <button class="btn btn-primary btn-sm" onclick="openPetModal()">+ Add pet</button>
  </div>
</div>

<div class="container">
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(this)">

<script>
// ── CONSTANTS ─────────────────────────────────────────────────
const EMOJIS = ['🐱','🐶','🐰','🐹','🦜','🐠','🐍','🦊','🐻','🐾','🦎','🐢','🐦','🐓','🦩'];
const BG_COLORS = ['#eaf3de','#e6f1fb','#fbeaf0','#faeeda','#eeedfe','#e1f5ee','#faece7','#f1efe8'];
const SPECIES = ['Cat','Dog','Rabbit','Bird','Fish','Hamster','Guinea Pig','Reptile','Other'];
const TABS = [
  { id:'vaccinations', label:'Vaccinations',     icon:'💉', icnCls:'icon-green'  },
  { id:'medications',  label:'Medications',       icon:'💊', icnCls:'icon-blue'   },
  { id:'vetVisits',    label:'Vet visits',         icon:'🏥', icnCls:'icon-teal'   },
  { id:'weight',       label:'Weight & metrics',   icon:'⚖️', icnCls:'icon-amber'  },
  { id:'notes',        label:'Health notes',       icon:'📋', icnCls:'icon-coral'  },
  { id:'contacts',     label:'Emergency contacts', icon:'📞', icnCls:'icon-purple' },
];

// ── STATE ─────────────────────────────────────────────────────
let state = { pets: [], activePetId: null };
let activeTab = 'vaccinations';
let modalCtx = {};

function loadState() {
  try { const r = localStorage.getItem('petHealthLog_v3'); if (r) state = JSON.parse(r); } catch(e) {}
}
function saveState() { localStorage.setItem('petHealthLog_v3', JSON.stringify(state)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function getActivePet() { return state.pets.find(p => p.id === state.activePetId) || null; }

// ── UTILS ─────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function fmtShort(d) {
  if (!d) return '—';
  const dt = new Date(d + 'T12:00:00');
  return isNaN(dt) ? d : dt.toLocaleDateString('en-GB', { month:'short', year:'numeric' });
}
function petAge(bd) {
  if (!bd) return '—';
  const diff = Date.now() - new Date(bd);
  const y = Math.floor(diff / (365.25 * 864e5));
  const m = Math.floor((diff % (365.25 * 864e5)) / (30.44 * 864e5));
  if (y < 1) return m < 1 ? '< 1 mo' : `${m} mo`;
  return `${y} yr${y > 1 ? 's' : ''}`;
}
function vacStatus(nextDue) {
  if (!nextDue) return { label:'No due date', cls:'pill-gray' };
  const days = Math.round((new Date(nextDue) - new Date()) / 864e5);
  if (days < 0)   return { label:'Overdue',  cls:'pill-red'   };
  if (days <= 30) return { label:'Due soon', cls:'pill-amber' };
  return { label:'Current', cls:'pill-green' };
}
function medStatusCls(s) {
  return { active:'pill-green', prn:'pill-blue', completed:'pill-gray', discontinued:'pill-red' }[s] || 'pill-gray';
}
function visitTypeCls(t) {
  return { annual:'pill-green', checkup:'pill-green', sick:'pill-amber', booster:'pill-blue', dental:'pill-purple', emergency:'pill-red' }[t] || 'pill-gray';
}
function speciesBadge(sp) {
  return { Cat:'badge-cat', Dog:'badge-dog', Rabbit:'badge-rabbit', Bird:'badge-bird' }[sp] || 'badge-other';
}

// ── RENDER: SIDEBAR ───────────────────────────────────────────
function renderSidebar() {
  const upcoming  = state.pets.flatMap(p => p.vetVisits||[]).filter(v => v.date >= today()).length;
  const activeMeds = state.pets.flatMap(p => p.medications||[]).filter(m => m.status === 'active').length;
  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-section-label">My pets</div>
    ${state.pets.map(p => `
      <button class="pet-tab ${p.id === state.activePetId ? 'active' : ''}" onclick="selectPet('${p.id}')">
        <div class="pet-avatar" style="background:${p.bgColor||'#eaf3de'}">${p.emoji||'🐾'}</div>
        <div>
          <div class="pet-tab-name">${esc(p.name)}</div>
          <div class="pet-tab-sub">${esc(p.species||'')}${p.birthdate ? ' · ' + petAge(p.birthdate) : ''}</div>
        </div>
      </button>`).join('')}
    <button class="add-pet-btn" onclick="openPetModal()"><span style="font-size:16px">+</span> Add a pet</button>
    <div style="margin-top:4px"></div>

function vetVisits(pet) {

// ── WEIGHT ────────────────────────────────────────────────────
function weight(pet) {
  const items = [...(pet.weightLogs||[])].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const hdr = secHeader('⚖️','icon-amber','Weight & health metrics','weightLog','Log weight');
  if (!items.length) return hdr + emptyState('⚖️','No weight entries yet');
  const vals = items.map(w => parseFloat(w.weight)||0).filter(Boolean);
  const maxW = Math.max(...vals);
  const latest = items[items.length-1];
  const prev   = items[items.length-2];
  const change = prev ? (parseFloat(latest.weight)-parseFloat(prev.weight)).toFixed(2) : null;
  const unit   = latest.unit || 'kg';
  const bars   = items.slice(-10).map((w,i) => {
    const pct = maxW ? Math.round((parseFloat(w.weight)/maxW)*95) : 50;
    return `<div class="weight-bar-row">
      <div class="weight-label">${fmtShort(w.date)}</div>
      <div class="weight-bar-wrap"><div class="weight-bar ${i%2===0?'bar-teal':'bar-blue'}" style="width:${pct}%">${w.weight}</div></div>
      <div class="weight-val">${esc(w.weight)} ${esc(w.unit||'kg')}</div>
      <div class="weight-wactions">
        <button class="ra-btn" onclick="openRecordModal('weightLog','${w.id}')">✏</button>
        <button class="ra-btn del" onclick="confirmDeleteRecord('weightLog','${w.id}')">✕</button>
      </div></div>`;
  }).join('');
  const chgColor = change===null?'':parseFloat(change)>0?'color:#e24b4a':parseFloat(change)<0?'color:#1d9e75':'';
  const metrics = `<div class="metrics-grid">
    <div class="metric-card"><div class="mc-label">Current weight</div>
      <div class="mc-value">${esc(latest.weight)} ${unit}</div>
      <div class="mc-sub" style="color:#888780">${fmt(latest.date)}</div></div>
    ${change!==null?`<div class="metric-card"><div class="mc-label">Change</div>
      <div class="mc-value" style="${chgColor}">${parseFloat(change)>0?'+':''}${change} ${unit}</div>
      <div class="mc-sub" style="color:#888780">vs previous entry</div></div>`:''}
    <div class="metric-card"><div class="mc-label">Total entries</div>
      <div class="mc-value">${items.length}</div>
      <div class="mc-sub" style="color:#888780">weight records</div></div>
    ${pet.microchip?`<div class="metric-card"><div class="mc-label">Microchip</div>
      <div class="mc-value" style="font-size:13px">${esc(pet.microchip)}</div>
      <div class="mc-sub" style="color:#639922">Registered ✓</div></div>`:''}
  </div>`;
  return hdr + `<div class="weight-section">
    <div class="weight-range-hint">Weight over time (${unit}) — last ${Math.min(items.length,10)} entries</div>
    ${bars}</div>${metrics}`;
}

function buildFormHTML(fields, data) {
  return `<div class="form-grid form-2">${fields.map(f => {
    const v = data[f.id]||'';
    const full = f.full ? 'span2' : '';
    let inp = f.type==='select'
      ? `<select id="rf_${f.id}">${(f.opts||[]).map(o=>`<option value="${o}" ${v===o?'selected':''}>${o.charAt(0).toUpperCase()+o.slice(1)}</option>`).join('')}</select>`
      : f.type==='textarea'
        ? `<textarea id="rf_${f.id}" placeholder="${f.ph||''}">${esc(v)}</textarea>`
        : `<input type="${f.type}" id="rf_${f.id}" value="${esc(v)}" placeholder="${f.ph||''}">`;
    return `<div class="form-group ${full}"><label>${f.label}${f.req?` <span class="req">*</span>`:''}</label>${inp}</div>`;

function openAddModal(section) {
  const cfg = RECORD_FORMS[section]; if (!cfg) return;
  modalCtx = { type:'record', section, recordId:null };
  const def = { date:today(), unit:'kg', weightUnit:'kg', status:'active', type: section==='vetVisit'?'annual':'normal' };
  openModal('Add '+cfg.title.toLowerCase(), buildFormHTML(cfg.fields,def),
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveRecordForm('${section}')">Add entry</button>`);
}
function openRecordModal(section, recordId) {
  const pet = getActivePet(); if (!pet) return;
  const cfg = RECORD_FORMS[section]; if (!cfg) return;
  const record = sectionArray(pet,section).find(r=>r.id===recordId); if (!record) return;
  modalCtx = { type:'record', section, recordId };
  openModal('Edit '+cfg.title.toLowerCase(), buildFormHTML(cfg.fields,record),
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveRecordForm('${section}')">Save changes</button>`);
}
function saveRecordForm(section) {
  const cfg = RECORD_FORMS[section]; if (!cfg) return;
  const data = {};
  for (const f of cfg.fields) {
    const el = document.getElementById('rf_'+f.id); if (!el) continue;
    data[f.id] = el.value.trim();
    if (f.req && !data[f.id]) { alert(f.label+' is required'); return; }
  }
  const pet = getActivePet(); if (!pet) return;
  const arr = sectionArray(pet,section);
  if (modalCtx.recordId) { Object.assign(arr.find(r=>r.id===modalCtx.recordId), data); }
  else { arr.push({ id:genId(), ...data }); }
  saveState(); closeModal(); renderAll();
}

// ── DELETE ────────────────────────────────────────────────────
function confirmDeleteRecord(section, recordId) {
  modalCtx = { type:'confirmRecord', section, recordId };
  openModal('Delete entry',
    `<div class="confirm-icon">🗑️</div><div class="confirm-msg">Delete this entry? This cannot be undone.</div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn btn-danger" onclick="doDeleteRecord()">Delete</button>`);
}
function doDeleteRecord() {
  const pet = getActivePet(); if (!pet) return;
  const arr = sectionArray(pet, modalCtx.section);
  const idx = arr.findIndex(r=>r.id===modalCtx.recordId);
  if (idx>-1) arr.splice(idx,1);
  saveState(); closeModal(); renderAll();
}
function confirmDeletePet(petId) {
  const pet = state.pets.find(p=>p.id===petId); if (!pet) return;
  modalCtx = { type:'confirmPet', petId };
  openModal('Remove pet',
    `<div class="confirm-icon">⚠️</div><div class="confirm-msg">Remove <strong>${esc(pet.name)}</strong> and all their records? This cannot be undone.</div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn btn-danger" onclick="doDeletePet()">Remove pet</button>`);
}
function doDeletePet() {
  state.pets = state.pets.filter(p=>p.id!==modalCtx.petId);
  if (state.activePetId===modalCtx.petId) state.activePetId = state.pets[0]?.id||null;
  saveState(); closeModal(); renderAll();
}

// ── EXPORT / IMPORT ───────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`pet-health-backup-${today()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('petLog_lastExport', Date.now().toString());
}
function importData(input) {
  const file = input.files[0]; if (!file) return;
  const fr = new FileReader();
  fr.onload = e => {
    try {
      const imp = JSON.parse(e.target.result);
      if (!imp.pets) throw new Error();
      if (!confirm(`Replace current data with backup (${imp.pets.length} pet${imp.pets.length!==1?'s':''})?`)) { input.value=''; return; }
      state = imp;
      if (!state.activePetId && state.pets.length) state.activePetId = state.pets[0].id;
      saveState(); renderAll(); alert('Backup restored!');
    } catch { alert('Invalid backup file.'); }
    input.value = '';
  };
  fr.readAsText(file);
}

// ── NAV ───────────────────────────────────────────────────────
function selectPet(id) { state.activePetId=id; activeTab='vaccinations'; saveState(); renderAll(); }
function switchTab(tab) { activeTab=tab; renderAll(); }
function renderAll() { renderSidebar(); renderMain(); }
