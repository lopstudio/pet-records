<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Pet Health Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ── CSS VARIABLES (light / dark) ─────────────────────────── */
:root {
  --bg:        #f5f3ee;
  --surface:   #ffffff;
  --border:    #d3d1c7;
  --border-2:  #f1efe8;
  --text:      #2c2c2a;
  --text-2:    #5f5e5a;
  --text-3:    #888780;
  --muted:     #f5f3ee;
  --muted-2:   #faf9f7;
  --green:     #1d9e75;
  --green-bg:  #e1f5ee;
  --green-dk:  #0f6e56;
  --amber-bg:  #faeeda;
  --red-bg:    #fcebeb;
  --shadow:    rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg:        #1a1917;
  --surface:   #242320;
  --border:    #3a3835;
  --border-2:  #2e2c29;
  --text:      #e8e6df;
  --text-2:    #a8a69f;
  --text-3:    #706e68;
  --muted:     #2a2825;
  --muted-2:   #201f1d;
  --green:     #2dbf8e;
  --green-bg:  #0d2b22;
  --green-dk:  #26a87c;
  --amber-bg:  #2d2009;
  --red-bg:    #2d1212;
  --shadow:    rgba(0,0,0,0.3);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; overflow-x: hidden; transition: background .2s, color .2s; }
button { font-family: inherit; cursor: pointer; }
.ic { display: inline-block; vertical-align: -0.15em; width: 16px; height: 16px; flex-shrink: 0; }

input, select, textarea { font-family: inherit; }

/* Header */
.app-header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 0.85rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.app-title { font-size: 1.05rem; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 10px; }
.paw-icon { width: 28px; height: 28px; background: var(--green-bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.paw-icon .ic { width: 16px; height: 16px; color: var(--green-dk); }
.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn { width: 34px; height: 34px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-2); cursor: pointer; transition: .12s; }
.icon-btn .ic { width: 17px; height: 17px; }
.icon-btn:hover { background: var(--muted); color: var(--text); border-color: var(--text-3); }

/* Layout */
.container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
.layout { display: grid; grid-template-columns: 224px 1fr; gap: 1.5rem; align-items: start; }

/* Sidebar */
.sidebar { display: flex; flex-direction: column; gap: 0.7rem; position: sticky; top: 66px; }
.sb-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); padding: 0 4px; }
.pet-tab { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .12s; width: 100%; text-align: left; position: relative; }
.pet-tab:hover { border-color: var(--text-3); }
.pet-tab.active { border-color: var(--green); background: var(--green-bg); }
.pet-tab-name { font-size: 13px; font-weight: 600; color: var(--text); }
.pet-tab.active .pet-tab-name { color: var(--green-dk); }
.pet-tab-sub { font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 6px; min-width: 0; }
.pet-tab-sub .sub-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.pet-tab-sub .sub-more { flex-shrink: 0; font-size: 10px; color: var(--text-3); background: var(--muted); border-radius: 10px; padding: 1px 6px; }
.pet-tab-sub.sub-red { color: #a32d2d; }
.pet-tab-sub.sub-amber { color: #854f0b; }
.pet-tab-sub.sub-green { color: #0f6e56; }
[data-theme="dark"] .pet-tab-sub.sub-red { color: #f09595; }
[data-theme="dark"] .pet-tab-sub.sub-amber { color: #fac775; }
[data-theme="dark"] .pet-tab-sub.sub-green { color: #5dcaa5; }
.badge-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; border: 1.5px solid var(--surface); }
.dot-red { background: #e24b4a; }
.dot-amber { background: #ef9f27; }
.dot-green { background: var(--green); }
.add-pet-btn { border: 0.5px dashed var(--border); border-radius: 10px; padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-2); font-size: 13px; background: transparent; width: 100%; transition: .12s; }
.add-pet-btn:hover { background: var(--surface); border-color: var(--text-3); color: var(--text); }
.stats-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px; }
.stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border-2); }
.stat-row:last-child { border-bottom: none; }
.stat-lbl { font-size: 11px; color: var(--text-3); }
.stat-num { font-size: 17px; font-weight: 700; color: var(--text); }

/* Main */
.main { display: flex; flex-direction: column; gap: 1.25rem; min-width: 0; }

/* Welcome */
.welcome { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 4rem 2rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem; }
.welcome h2 { font-size: 1.3rem; font-weight: 600; }
.welcome p { color: var(--text-3); font-size: 13px; max-width: 320px; line-height: 1.7; }

/* Pet header */
.pet-header-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.25rem; }
.pet-header-top { display: flex; align-items: flex-start; gap: 1rem; }
.pet-header-info { flex: 1; min-width: 0; }
.pet-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
.pet-name { font-size: 1.2rem; font-weight: 600; color: var(--text); }
.pet-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
.badge-cat    { background: #faeeda; color: #633806; }
.badge-dog    { background: #e6f1fb; color: #0c447c; }
.badge-rabbit { background: #fbeaf0; color: #72243e; }
.badge-bird   { background: #eeedfe; color: #3c3489; }
.badge-other  { background: var(--muted); color: var(--text-2); }
[data-theme="dark"] .badge-cat { background: #2d2009; color: #fac775; }
[data-theme="dark"] .badge-dog { background: #042c53; color: #85b7eb; }
[data-theme="dark"] .badge-rabbit { background: #4b1528; color: #ed93b1; }
[data-theme="dark"] .badge-bird { background: #26215c; color: #afa9ec; }
.alert-chip { background: var(--red-bg); color: #c0392b; border-radius: 6px; padding: 3px 9px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
[data-theme="dark"] .alert-chip { color: #f09595; }
.alert-chip .ic { width: 12px; height: 12px; }
.pet-sub-line { font-size: 13px; color: var(--text-2); margin-bottom: 8px; }
.pet-meta-mini { display: flex; gap: 14px; flex-wrap: wrap; }
.pet-meta-mini span { font-size: 12px; color: var(--text-3); display: inline-flex; align-items: center; gap: 5px; }
.pet-meta-mini .ic { width: 14px; height: 14px; }
.hdr-btn-group { display: flex; gap: 6px; flex-shrink: 0; }

/* Metric cards */
.pet-metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 16px; }
.mc { background: var(--muted); border-radius: 10px; padding: 11px 13px; }
.mc-l { font-size: 11px; color: var(--text-3); margin-bottom: 5px; }
.mc-v { font-size: 19px; font-weight: 600; color: var(--text); line-height: 1; }
.mc-v small { font-size: 11px; color: var(--text-3); font-weight: 400; }
.mc-v.mc-danger { color: #c0392b; }
.mc-v.mc-warn { color: #854f0b; }
[data-theme="dark"] .mc-v.mc-danger { color: #f09595; }
[data-theme="dark"] .mc-v.mc-warn { color: #fac775; }
.mc-v.mc-empty { color: var(--text-3); font-weight: 400; }

/* Section card */
.section-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.section-tabs { display: flex; gap: 4px; padding: 10px 14px; border-bottom: 0.5px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.section-tabs::-webkit-scrollbar { display: none; }
.stab { padding: 6px 14px; border-radius: 9px; font-size: 12.5px; font-weight: 500; border: 0.5px solid transparent; color: var(--text-2); cursor: pointer; background: none; white-space: nowrap; transition: .1s; }
.stab:hover { background: var(--muted); }
.stab.active { background: var(--text); color: var(--surface); border-color: var(--text); }
.sec-toolbar { padding: 10px 16px; border-bottom: 0.5px solid var(--border-2); display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
.sec-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--text); }
.s-ic { width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
.s-ic .ic { width: 15px; height: 15px; }
.ig { background: #eaf3de; } .ib { background: #e6f1fb; } .ia { background: #faeeda; }
.it { background: #e1f5ee; } .inote { background: #faece7; } .ip { background: #eeedfe; } .iw { background: #e8f3fb; }
.iall { background: var(--muted); }
.sec-right { display: flex; align-items: center; gap: 6px; }
.search-input { padding: 5px 10px; border: 0.5px solid var(--border); border-radius: 7px; font-size: 12px; color: var(--text); background: var(--muted); outline: none; width: 160px; transition: .1s; }
.search-input:focus { border-color: var(--green); background: var(--surface); box-shadow: 0 0 0 2px rgba(29,158,117,.1); }
.search-input::placeholder { color: var(--text-3); }
.add-row-btn { font-size: 12px; color: var(--green); background: none; border: none; cursor: pointer; padding: 4px 10px; border-radius: 6px; font-weight: 500; transition: .1s; white-space: nowrap; }
.add-row-btn:hover { background: var(--green-bg); }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { padding: 7px 16px; background: var(--muted); text-align: left; font-weight: 600; color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
.data-table td { padding: 10px 16px; border-bottom: 0.5px solid var(--border-2); color: var(--text); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--muted-2); }
.td-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.row-actions { display: flex; gap: 3px; opacity: 0; transition: .1s; }
.data-table tr:hover .row-actions { opacity: 1; }
.ra-btn { background: var(--muted); border: none; cursor: pointer; width: 30px; height: 30px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-2); transition: .12s; }
.ra-btn .ic { width: 16px; height: 16px; }
.ra-btn:hover { background: var(--border-2); color: var(--text); }
.ra-btn.del { background: var(--red-bg); color: #c0392b; }
.ra-btn.del:hover { background: #f5d3cd; color: #a32d2d; }
[data-theme="dark"] .ra-btn.del { color: #f09595; }
[data-theme="dark"] .ra-btn.del:hover { background: #5a201b; }
.no-results { padding: 2rem; text-align: center; color: var(--text-3); font-size: 13px; }

/* Pills */
.pill { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.pill-green  { background: #eaf3de; color: #3b6d11; }
.pill-amber  { background: #faeeda; color: #854f0b; }
.pill-red    { background: #fcebeb; color: #a32d2d; }
.pill-blue   { background: #e6f1fb; color: #185fa5; }
.pill-gray   { background: var(--muted); color: var(--text-2); }
.pill-purple { background: #eeedfe; color: #3c3489; }
.pill-teal   { background: #e1f5ee; color: #0f6e56; }

/* Notes */
.notes-list { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.note-item { background: var(--muted); border-radius: 8px; padding: 12px 14px; border-left: 3px solid var(--border); position: relative; }
.note-item.note-concern { border-left-color: #ef9f27; background: var(--amber-bg); }
.note-item.note-good    { border-left-color: #639922; background: #f2fae8; }
[data-theme="dark"] .note-item.note-good { background: #0d2009; }
.note-date { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
.note-text { font-size: 13px; line-height: 1.55; color: var(--text); }
.note-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 3px; opacity: 0; transition: .1s; }
.note-item:hover .note-actions { opacity: 1; }

/* Weight */
.weight-section { padding: 14px 16px; }
.metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 16px 0; }
.mc { background: var(--muted); border-radius: 10px; padding: 11px 13px; }
.wchart-legend { display: flex; gap: 16px; padding: 12px 16px 6px; font-size: 12px; color: var(--text-2); }
.wchart-legend span { display: flex; align-items: center; gap: 5px; }
.lg-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.wchart-wrap { padding: 0 16px 6px; }
.wchart { width: 100%; height: auto; display: block; overflow: visible; }
.wc-grid { stroke: var(--border-2); stroke-width: 1; }
.wc-axis { font-size: 10px; fill: var(--text-3); font-family: 'Plus Jakarta Sans', sans-serif; }
.wc-area { fill: rgba(186,117,23,.08); stroke: none; }
.wc-line { fill: none; stroke: #BA7517; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
[data-theme="dark"] .wc-line { stroke: #EF9F27; }
[data-theme="dark"] .wc-area { fill: rgba(239,159,39,.10); }
.wlist { padding: 8px 16px 16px; }
.wlist-row { display: grid; grid-template-columns: 110px 80px 1fr auto; align-items: center; gap: 10px; padding: 9px 0; border-top: 0.5px solid var(--border-2); }
.wlist-row:first-child { border-top: none; }
.wlist-date { font-size: 12.5px; color: var(--text-2); }
.wlist-val { font-size: 14px; font-weight: 500; color: var(--text); }
.wlist-val small { font-size: 11px; color: var(--text-3); font-weight: 400; }
.wlist-note { font-size: 12px; color: var(--text-3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wlist-empty { padding: 12px 16px 18px; font-size: 12.5px; color: var(--text-3); }
.w-acts { display: flex; gap: 2px; opacity: 0; transition: .1s; }
.wlist-row:hover .w-acts { opacity: 1; }

/* Contacts */
.contacts-grid { padding: 14px 16px; display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 10px; }
.contact-card { background: var(--muted); border-radius: 8px; padding: 12px 14px; position: relative; }
.c-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin-bottom: 4px; }
.c-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.c-phone { font-size: 12px; color: var(--green); font-weight: 500; margin-bottom: 2px; }
.c-note { font-size: 11px; color: var(--text-3); }
.contact-actions { position: absolute; top: 8px; right: 8px; opacity: 0; transition: .1s; display: flex; gap: 3px; }
.contact-card:hover .contact-actions { opacity: 1; }

/* Parasite tracker */
.parasite-grid { padding: 14px 16px; display: grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap: 12px; }
.parasite-card { background: var(--muted); border-radius: 10px; padding: 14px; border: 0.5px solid var(--border-2); position: relative; }
.parasite-card.overdue { border-color: #e24b4a; background: var(--red-bg); }
.parasite-card.due-soon { border-color: #ef9f27; background: var(--amber-bg); }
.parasite-card.current { border-color: var(--green); }
.p-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); margin-bottom: 5px; }
.p-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.p-detail { font-size: 12px; color: var(--text-2); display: flex; justify-content: space-between; margin-bottom: 3px; }
.p-detail span:last-child { font-weight: 500; color: var(--text); }
.p-status { margin-top: 10px; }
.parasite-actions { position: absolute; top: 10px; right: 10px; opacity: 0; transition: .1s; display: flex; gap: 3px; }
.parasite-card:hover .parasite-actions { opacity: 1; }

/* Tips */
/* Footer summary (Option C) */
.footer-summary { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; overflow: hidden; }
.fs-stats { display: grid; grid-template-columns: repeat(3, 1fr); }
.fs-stat { padding: 14px 16px; border-right: 0.5px solid var(--border-2); }
.fs-stat:last-child { border-right: none; }
.fs-v { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
.fs-v small { font-size: 11px; font-weight: 400; color: var(--text-3); }
.fs-v.fs-warn { color: #854f0b; }
[data-theme="dark"] .fs-v.fs-warn { color: #fac775; }
.fs-l { font-size: 11px; color: var(--text-3); margin-top: 6px; }
.fs-next { display: flex; gap: 13px; align-items: center; padding: 12px 16px; border: none; border-top: 0.5px solid var(--border-2); cursor: pointer; transition: background .1s; width: 100%; text-align: left; background: none; font-family: inherit; color: var(--text); -webkit-appearance: none; appearance: none; }
.fs-next:focus-visible { outline: 2px solid var(--green); outline-offset: -2px; }
.fs-next:hover { background: var(--muted-2); }
.fs-next-date { width: 46px; flex-shrink: 0; text-align: center; }
.fs-next-date { background: var(--amber-bg); border-radius: 8px; padding: 6px 0; }
.fs-next-d { font-size: 15px; font-weight: 600; color: #854f0b; line-height: 1; }
.fs-next-m { font-size: 9px; font-weight: 500; color: #ba7517; text-transform: uppercase; margin-top: 2px; }
[data-theme="dark"] .fs-next-d { color: #fac775; }
[data-theme="dark"] .fs-next-m { color: #ef9f27; }
.fs-next-body { flex: 1; min-width: 0; }
.fs-next-t { font-size: 13px; font-weight: 500; color: var(--text); }
.fs-next-sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }
.fs-when { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; background: var(--muted); color: var(--text-2); flex-shrink: 0; }
.fs-when.fw-overdue { background: var(--red-bg); color: #a32d2d; }
.fs-when.fw-soon { background: var(--amber-bg); color: #854f0b; }
[data-theme="dark"] .fs-when.fw-overdue { color: #f09595; }
[data-theme="dark"] .fs-when.fw-soon { color: #fac775; }
.fs-next-empty { padding: 14px 16px; font-size: 12.5px; color: var(--text-3); border-top: 0.5px solid var(--border-2); }

/* Backup banner */
.backup-banner { background: var(--amber-bg); border: 0.5px solid #f5c475; border-radius: 10px; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; font-size: 12px; color: #633806; }

/* Empty state */
.empty-state { padding: 2.5rem; text-align: center; color: var(--text-3); font-size: 13px; }
.empty-state .ei { font-size: 2rem; margin-bottom: 8px; color: var(--text-3); }
.empty-state .ei .ic { width: 2rem; height: 2rem; }

/* Buttons */
.btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; border: 0.5px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; transition: .12s; display: inline-flex; align-items: center; gap: 5px; }
.btn .ic { width: 15px; height: 15px; }
.btn:hover { background: var(--muted); }
.btn-primary { background: var(--green); border-color: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-dk); }
.btn-soft { background: var(--green-bg); border-color: transparent; color: var(--green-dk); }
.btn-soft:hover { background: var(--green); color: #fff; }
.btn-soft .ic { color: currentColor; }
.btn-danger { background: #e24b4a; border-color: #e24b4a; color: #fff; }
.btn-danger:hover { background: #a32d2d; }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.edit-pet-btn { background: var(--muted); border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; transition: .12s; }
.edit-pet-btn:hover { background: var(--border); }
.del-pet-btn { background: var(--red-bg); border: 0.5px solid #f7c1c1; border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 500; color: #a32d2d; cursor: pointer; transition: .12s; }
.del-pet-btn:hover { background: #fcebeb; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; max-height: 90dvh; overflow-y: auto; box-shadow: 0 20px 60px var(--shadow); border: 0.5px solid var(--border); }
.modal-hdr { padding: 1.2rem 1.5rem; border-bottom: 0.5px solid var(--border-2); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); z-index: 1; }
.modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.modal-close { background: var(--muted); border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); transition: .1s; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 1.5rem; }
.modal-foot { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border-2); display: flex; justify-content: flex-end; gap: 8px; }

/* Confirm dialog (replaces native confirm()) */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 2500; padding: 1rem; }
.confirm-overlay.open { display: flex; }
.confirm-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; width: 100%; max-width: 320px; padding: 1.5rem 1.5rem 1.25rem; text-align: center; box-shadow: 0 20px 60px var(--shadow); }
.confirm-ico { width: 42px; height: 42px; border-radius: 50%; background: var(--green-bg); color: var(--green-dk); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.confirm-ico .ic { width: 20px; height: 20px; }
.confirm-ico.danger { background: var(--red-bg); color: #c0392b; }
[data-theme="dark"] .confirm-ico.danger { color: #f09595; }
.confirm-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.confirm-msg { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 18px; }
.confirm-actions { display: flex; gap: 8px; }
.confirm-btn { flex: 1; padding: 10px 0; border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; border: none; transition: .12s; }
.confirm-btn.cancel { background: var(--muted); color: var(--text-2); }
.confirm-btn.cancel:hover { background: var(--border-2); color: var(--text); }
.confirm-btn.go { background: var(--green); color: #fff; }
.confirm-btn.go:hover { background: var(--green-dk); }
.confirm-btn.go.danger { background: #c0392b; }
.confirm-btn.go.danger:hover { background: #a32d2d; }
.confirm-btn:focus-visible { outline: 2px solid var(--green); outline-offset: 2px; }

/* Forms */
.form-grid { display: grid; gap: 1rem; }
.f2 { grid-template-columns: 1fr 1fr; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.s2 { grid-column: span 2; }
label { font-size: 12px; font-weight: 600; color: var(--text-2); }
.req { color: #e24b4a; }
input[type=text],input[type=date],input[type=number],input[type=tel],select,textarea { width: 100%; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); background: var(--surface); outline: none; transition: border .1s; }
input:focus,select:focus,textarea:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,.1); }
select option { background: var(--surface); color: var(--text); }
textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.hint { font-size: 11px; color: var(--text-3); }
.emoji-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.emoji-opt { width: 40px; height: 40px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--muted); font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: .1s; }
.emoji-opt:hover { border-color: var(--green); }
.emoji-opt.sel { border-color: var(--green); background: var(--green-bg); }
.color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
.color-opt { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: .15s; }
.color-opt.sel { border-color: var(--text); transform: scale(1.15); }
.photo-upload-area { border: 1.5px dashed var(--border); border-radius: 10px; padding: 1rem; text-align: center; cursor: pointer; transition: .15s; background: var(--muted-2); }
.photo-upload-area:hover { border-color: var(--green); background: var(--green-bg); }
.photo-preview { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--green); display: block; margin: 0 auto 6px; }
.avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
.photo-remove-btn { font-size: 11px; color: #a32d2d; background: none; border: none; cursor: pointer; margin-top: 6px; padding: 2px 8px; border-radius: 5px; }
.photo-remove-btn:hover { background: var(--red-bg); }
.confirm-icon { font-size: 2.5rem; text-align: center; margin-bottom: .75rem; }
.confirm-icon .ic { width: 2.25rem; height: 2.25rem; }
.confirm-icon.del .ic { color: #c0392b; }
.confirm-icon.warn .ic { color: #854f0b; }
[data-theme="dark"] .confirm-icon.del .ic { color: #f09595; }
[data-theme="dark"] .confirm-icon.warn .ic { color: #fac775; }
.confirm-msg { text-align: center; color: var(--text-2); font-size: 14px; line-height: 1.65; margin-bottom: 1.25rem; }

/* Notifications (phone-style) */
.notif-stack { display: flex; flex-direction: column; gap: 8px; }
.notif-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,.05), 0 0 0 0.5px rgba(0,0,0,.02); cursor: pointer; transition: transform .14s ease, box-shadow .14s ease; position: relative; overflow: hidden; }
.notif-card:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,.08); }
.notif-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--text-3); }
.notif-card.overdue::before  { background: #e24b4a; }
.notif-card.soon::before     { background: #ef9f27; }
.notif-card.upcoming::before { background: var(--green); }
.notif-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.notif-icon .ic { width: 16px; height: 16px; }
.notif-card.overdue  .notif-icon { background: var(--red-bg); }
.notif-card.overdue  .notif-icon .ic { color: #a32d2d; }
.notif-card.soon     .notif-icon { background: var(--amber-bg); }
.notif-card.soon     .notif-icon .ic { color: #854f0b; }
.notif-card.upcoming .notif-icon { background: var(--green-bg); }
.notif-card.upcoming .notif-icon .ic { color: var(--green-dk); }
[data-theme="dark"] .notif-card.overdue .notif-icon .ic { color: #f09595; }
[data-theme="dark"] .notif-card.soon .notif-icon .ic { color: #fac775; }
.notif-body { flex: 1; min-width: 0; }
.notif-meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-3); margin-bottom: 3px; gap: 8px; }
.notif-app  { font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.notif-time { font-weight: 500; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.notif-card.overdue  .notif-time { color: #a32d2d; }
.notif-card.soon     .notif-time { color: #854f0b; }
.notif-card.upcoming .notif-time { color: var(--green-dk); }
.notif-title { font-size: 13.5px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; }
.notif-sub { font-size: 12px; color: var(--text-2); line-height: 1.4; }

/* All / Timeline — minimal version */
.range-bar { padding: 10px 16px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; border-bottom: 0.5px solid var(--border-2); }
.range-lbl { font-size: 11px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-right: 4px; }
.range-pill { padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 0.5px solid var(--border); color: var(--text-2); cursor: pointer; background: var(--surface); transition: .1s; white-space: nowrap; }
.range-pill:hover { background: var(--muted); }
.range-pill.active { background: var(--text); color: var(--surface); border-color: var(--text); }
.range-custom { display: flex; align-items: center; gap: 6px; margin-left: 4px; font-size: 12px; color: var(--text-3); }
.range-custom input[type=date] { padding: 4px 8px; font-size: 12px; width: auto; }

.timeline-month { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); padding: 16px 16px 6px; }
.timeline-month:first-child { padding-top: 12px; }
.timeline-row { padding: 14px 16px; border-top: 0.5px solid var(--border-2); display: flex; gap: 16px; align-items: flex-start; position: relative; transition: background .1s; }
.timeline-month + .timeline-row { border-top: none; }
.timeline-row:hover { background: var(--muted-2); }

/* V3 date pill */
.tl-date { width: 52px; flex-shrink: 0; display: flex; align-items: flex-start; }
.tl-date-inner { background: var(--amber-bg); border-radius: 9px; padding: 7px 0; width: 100%; text-align: center; font-variant-numeric: tabular-nums; }
.tl-date-inner.upcoming { background: var(--green-bg); }
.tl-day { font-size: 17px; font-weight: 600; color: #854f0b; line-height: 1; }
.tl-mon { font-size: 10px; font-weight: 600; color: #ba7517; margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; }
.tl-date-inner.upcoming .tl-day { color: var(--green-dk); }
.tl-date-inner.upcoming .tl-mon { color: var(--green); }
[data-theme="dark"] .tl-day { color: #fac775; }
[data-theme="dark"] .tl-mon { color: #ef9f27; }

.tl-content { flex: 1; min-width: 0; padding-top: 2px; }
.tl-title-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.tl-title { font-size: 14px; color: var(--text); line-height: 1.45; font-weight: 500; flex: 1; min-width: 0; word-break: break-word; }
.tl-meta { font-size: 11.5px; color: var(--text-3); line-height: 1.5; font-weight: 500; }

/* Truncated note with expand */
.tl-note { font-size: 12.5px; color: var(--text-2); line-height: 1.55; margin-top: 6px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
.tl-note.expanded { display: block; -webkit-line-clamp: unset; }
.tl-expand { font-size: 11.5px; color: var(--green-dk); margin-top: 4px; cursor: pointer; font-weight: 500; display: inline-block; padding: 2px 0; background: none; border: none; font-family: inherit; }
.tl-expand:hover { text-decoration: underline; }

.tl-followup { font-size: 11.5px; color: var(--text-2); margin-top: 8px; padding-left: 10px; border-left: 2px solid var(--border); line-height: 1.5; }

.tl-actions { display: flex; gap: 3px; opacity: 0; transition: .1s; flex-shrink: 0; align-self: flex-start; padding-top: 2px; }
.timeline-row:hover .tl-actions { opacity: 1; }

/* File attachments */
.attach-section { margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border-2); }
.attach-label-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.attach-add-btn { background: var(--muted); border: 0.5px dashed var(--border); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--text-2); cursor: pointer; font-weight: 500; transition: .12s; }
.attach-add-btn:hover { border-color: var(--green); color: var(--green-dk); background: var(--green-bg); }
.attach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; }
.attach-card { background: var(--muted); border-radius: 10px; padding: 8px; position: relative; cursor: pointer; transition: .12s; overflow: hidden; }
.attach-card:hover { background: var(--border-2); }
.attach-thumb { width: 100%; aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: var(--surface); display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
.attach-thumb img { width: 100%; height: 100%; object-fit: cover; }
.attach-thumb .pdf-ico { font-size: 28px; color: #c0392b; }
.attach-thumb .file-ico { font-size: 28px; color: var(--text-3); }
.attach-name { font-size: 11px; color: var(--text); font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attach-size { font-size: 10px; color: var(--text-3); margin-top: 2px; }
.attach-del { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,.5); color: #fff; border: none; width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 11px; display: none; align-items: center; justify-content: center; }
.attach-card:hover .attach-del { display: flex; }
.attach-loading { font-size: 12px; color: var(--text-3); padding: 8px 0; }

/* Read-only attachment row inside record list (vet visits table) */
.attach-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.attach-chip { font-size: 11px; color: var(--text-2); background: var(--muted); padding: 2px 8px; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: .1s; }
.attach-chip:hover { background: var(--border-2); color: var(--text); }
.attach-chip .ac-ic { display:inline-flex; }
.attach-chip .ac-ic .ic { width: 13px; height: 13px; }

/* Lightbox */
.lightbox { position: fixed; inset: 0; background: rgba(0,0,0,.88); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 2rem; cursor: zoom-out; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; box-shadow: 0 20px 60px rgba(0,0,0,.4); cursor: default; }
.lightbox-close { position: absolute; top: 1.25rem; right: 1.5rem; background: rgba(255,255,255,.12); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; backdrop-filter: blur(8px); }
.lightbox-close:hover { background: rgba(255,255,255,.22); }
.lightbox-caption { position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%); color: #fff; font-size: 12px; background: rgba(0,0,0,.5); padding: 6px 14px; border-radius: 20px; }

/* Export menu */
.export-menu { position: absolute; background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; box-shadow: 0 8px 24px var(--shadow); padding: 4px; min-width: 200px; z-index: 100; display: none; }
.export-menu.open { display: block; }
.export-menu button { display: flex; flex-direction: column; align-items: flex-start; gap: 2px; width: 100%; background: none; border: none; padding: 8px 12px; border-radius: 7px; cursor: pointer; text-align: left; color: var(--text); transition: .1s; }
.export-menu button:hover { background: var(--muted); }
.export-menu .em-title { font-size: 13px; font-weight: 500; }
.export-menu .em-sub { font-size: 11px; color: var(--text-3); }

/* Empty state CTA */
.empty-state .empty-cta { margin-top: 12px; }
.empty-cta-btn { background: var(--green); color: #fff; border: none; padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: .12s; }
.empty-cta-btn:hover { background: var(--green-dk); }

/* Mobile responsive */
@media (max-width: 760px) {
  .app-shell { width: 100%; max-width: 100%; overflow-x: hidden; }
  .app-header { width: 100%; max-width: 100%; padding: 0.7rem 0.9rem; flex-wrap: wrap; gap: 8px; position: static; padding-top: calc(0.7rem + env(safe-area-inset-top)); padding-left: calc(0.9rem + env(safe-area-inset-left)); padding-right: calc(0.9rem + env(safe-area-inset-right)); }
  .app-title { font-size: 1rem; }
  .header-actions { gap: 4px; }
  .header-actions .btn-primary span, .header-actions .btn-primary { font-size: 12px; }
  .icon-btn { width: 32px; height: 32px; }
  .container { padding: 0.85rem; padding-left: calc(0.85rem + env(safe-area-inset-left)); padding-right: calc(0.85rem + env(safe-area-inset-right)); padding-bottom: calc(0.85rem + env(safe-area-inset-bottom)); }
  .layout { grid-template-columns: 1fr; gap: 1rem; min-width: 0; max-width: 100%; }
  .sidebar { position: static; }
  .pet-header-card { padding: 1rem; }
  .pet-header-top { flex-wrap: wrap; }
  .hdr-btn-group { flex-direction: row; }
  .pet-name { font-size: 1.15rem; }
  .pet-metrics { grid-template-columns: 1fr 1fr; gap: 8px; }
  .mc { padding: 10px 11px; }
  .mc-v { font-size: 17px; }
  .metrics-grid { grid-template-columns: 1fr 1fr; }
  .fs-stats { grid-template-columns: 1fr 1fr 1fr; }
  .fs-stat { padding: 11px 10px; }
  .fs-v { font-size: 17px; }
  .wlist-row { grid-template-columns: 1fr auto auto; }
  .wlist-note { display: none; }
  .data-table th, .data-table td { padding: 7px 10px; font-size: 12px; }
  .row-actions, .note-actions, .contact-actions, .parasite-actions, .w-acts, .tl-actions { opacity: 1; }
  .search-input { width: 100%; }
  .sec-toolbar { flex-direction: column; align-items: stretch; gap: 8px; }
  .sec-right { width: 100%; }
  /* Tab bar scrolls horizontally instead of wrapping/cramping */
  .section-tabs { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
  .section-tabs::-webkit-scrollbar { display: none; }
  .stab { flex-shrink: 0; }
  .timeline-row { padding: 12px 12px; gap: 12px; }
  .tl-date { width: 46px; }
  .tl-day { font-size: 16px; }
  .tl-title-row { gap: 6px; }
  .form-grid.f2 { grid-template-columns: 1fr; }
  .fg.s2 { grid-column: span 1; }
  .notif-card { padding: 10px 12px; }
  .notif-icon { width: 28px; height: 28px; }
  .notif-icon .ic { width: 14px; height: 14px; }
  .attach-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .modal { width: 100%; max-width: 100%; border-radius: 14px 14px 0 0; }
  .auth-card { padding: 1.75rem 1.5rem; }
  .export-menu { min-width: 0; width: max-content; max-width: calc(100vw - 24px); }
  /* iOS Safari zooms in when a focused input has font < 16px — force 16px on phones */
  .search-input, .auth-input, .fg input, .fg select, .fg textarea,
  input[type="text"], input[type="email"], input[type="date"], input[type="number"], select, textarea { font-size: 16px; }
}

@media (max-width: 420px) {
  .pet-metrics { grid-template-columns: 1fr; }
  .metrics-grid { grid-template-columns: 1fr; }
  .fs-stats { grid-template-columns: 1fr; }
  .fs-stat { border-right: none; border-bottom: 0.5px solid var(--border-2); }
  .fs-stat:last-child { border-bottom: none; }
  .pet-name { font-size: 1.1rem; }
  .wchart-wrap { padding: 0 8px 6px; }
  .sync-pill { left: 16px; right: 16px; text-align: center; }
}

/* Auth gate */
.auth-gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 1.5rem; }
.auth-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 2rem 1.75rem; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 8px 30px var(--shadow); }
.auth-logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
.auth-title { font-size: 1.3rem; font-weight: 600; color: var(--text); margin-bottom: 0.5rem; }
.auth-sub { font-size: 13px; color: var(--text-2); line-height: 1.55; margin-bottom: 1.25rem; }
.auth-input { width: 100%; padding: 11px 13px; border: 0.5px solid var(--border); border-radius: 9px; font-size: 14px; background: var(--bg); color: var(--text); margin-bottom: 10px; font-family: inherit; }
.auth-input:focus { outline: none; border-color: var(--green); }
.auth-btn { width: 100%; padding: 11px; background: var(--green); color: #fff; border: none; border-radius: 9px; font-size: 14px; font-weight: 500; cursor: pointer; transition: .12s; font-family: inherit; }
.auth-btn:hover { background: var(--green-dk); }
.auth-btn:disabled { opacity: .6; cursor: default; }
.auth-msg { font-size: 12.5px; margin-top: 12px; line-height: 1.5; min-height: 1em; }
.auth-msg.ok { color: var(--green-dk); }
.auth-msg.err { color: #c0392b; }
[data-theme="dark"] .auth-msg.err { color: #f09595; }
.auth-offline { margin-top: 1.25rem; background: none; border: none; color: var(--text-3); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: inherit; }
.auth-offline:hover { color: var(--text-2); }

/* Sync status pill */
.sync-pill { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); right: 16px; z-index: 1500; background: var(--text); color: var(--surface); font-size: 12px; font-weight: 500; padding: 7px 14px; border-radius: 20px; box-shadow: 0 4px 14px var(--shadow); transition: opacity .3s; }
.sync-pill.err { background: #c0392b; color: #fff; }
.sync-pill.ok { background: var(--green); color: #fff; }

/* Print */
@media print {
  .app-header, .sidebar, .hdr-btn-group, .section-tabs, .sec-toolbar .sec-right,
  .add-row-btn, .row-actions, .note-actions, .contact-actions, .parasite-actions,

const SUPABASE_URL = 'https://gfgabksonyyluhaqnibs.supabase.co';

const CACHE_KEY = 'petHealthLog_v4';   // local cache / offline fallback
let sb = null;            // supabase client
let currentUser = null;   // logged-in user object
let offlineMode = false;  // user chose to skip login
let syncReady = false;    // cloud load completed
let saveTimer = null;     // debounce for cloud pushes

function initSupabase() {
  try {
    if(window.supabase && SUPABASE_URL && SUPABASE_KEY) {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      return true;
    }
  } catch(e) { console.error('Supabase init failed', e); }
  return false;
}

// Local cache helpers (instant render + offline)
function loadCache() {
  try { const r=localStorage.getItem(CACHE_KEY); if(r) state=JSON.parse(r); } catch(e) {}
  try { darkMode = localStorage.getItem('petLog_dark')==='true'; } catch(e) {}
}
function writeCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(state)); return true; }
  catch(err) {
    if(err && (err.name==='QuotaExceededError' || err.code===22 || err.code===1014)) {
      showSync('Local cache full — cloud sync still works', 'err', 4000);
    }
    return false;
  }
}

// loadState kept as a synchronous cache load (used at boot for instant paint)
function loadState() { loadCache(); }

// saveState writes cache immediately, then debounce-pushes to cloud
function saveState() {
  writeCache();
  if(currentUser && sb && !offlineMode) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushToCloud, 700);
  }
  return true;
}

async function pushToCloud() {
  if(!currentUser || !sb || offlineMode) return;
  showSync('Saving…', '', 0);
  try {
    const { error } = await sb.from('pet_data').upsert({
      user_id: currentUser.id,
      data: state,
      updated_at: new Date().toISOString()
    }, { onConflict: 'user_id' });
    if(error) throw error;
    showSync('Saved', 'ok', 1500);
  } catch(e) {
    console.error('Cloud save failed', e);
    showSync('Offline — saved locally, will retry', 'err', 3000);
  }
}

async function pullFromCloud() {
  if(!currentUser || !sb) return null;
  try {
    const { data, error } = await sb.from('pet_data').select('data').eq('user_id', currentUser.id).maybeSingle();
    if(error) throw error;
    return data ? data.data : null;
  } catch(e) {
    console.error('Cloud load failed', e);
    showSync('Couldn\u2019t reach cloud — showing local copy', 'err', 3500);
    return undefined;   // undefined = error (distinct from null = no row yet)
  }
}

function showSync(text, cls, timeout) {
  const pill = document.getElementById('syncPill');
  const t = document.getElementById('syncPillText');
  if(!pill || !t) return;
  t.textContent = text;
  pill.className = 'sync-pill' + (cls?(' '+cls):'');
  pill.style.display = 'block';
  pill.style.opacity = '1';
  clearTimeout(pill._t);
  if(timeout) pill._t = setTimeout(()=>{ pill.style.opacity='0'; setTimeout(()=>pill.style.display='none',300); }, timeout);
}

// In-app confirm dialog (Promise-based replacement for native confirm())
let _confirmResolve = null;
function showConfirm(opts) {
  opts = opts || {};
  return new Promise(resolve => {
    _confirmResolve = resolve;
    const ico = document.getElementById('confirmIco');
    ico.className = 'confirm-ico' + (opts.tone==='danger' ? ' danger' : '');
    ico.innerHTML = ic(opts.icon || 'alert-circle');
    document.getElementById('confirmTitle').textContent = opts.title || 'Are you sure?';
    document.getElementById('confirmMsg').textContent = opts.message || '';
    document.getElementById('confirmCancel').textContent = opts.cancelText || 'Cancel';
    const go = document.getElementById('confirmGo');
    go.textContent = opts.confirmText || 'Confirm';
    go.className = 'confirm-btn go' + (opts.tone==='danger' ? ' danger' : '');
    document.getElementById('confirmOverlay').classList.add('open');
    go.focus();
  });
}
function _closeConfirm(result) {
  document.getElementById('confirmOverlay').classList.remove('open');
  const r = _confirmResolve; _confirmResolve = null;
  if(r) r(result);

// ── FILE STORAGE (IndexedDB) ──────────────────────────────────
const DB_NAME = 'petHealthFiles_v1';
const STORE = 'files';
const MAX_FILE_BYTES = 8 * 1024 * 1024; // 8 MB per file
let _dbPromise = null;
function openDB() {
  if(_dbPromise) return _dbPromise;
  return _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: 'id' });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}
function cloudFiles() { return currentUser && sb && !offlineMode; }
function filePath(id) { return currentUser.id + '/' + id; }

async function fileStore_put(file, recordId) {
  const id = 'f_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  const meta = { id, name: file.name, type: file.type, size: file.size, addedAt: Date.now() };
  if(cloudFiles()) {
    const { error } = await sb.storage.from('attachments').upload(filePath(id), file, {
      contentType: file.type || 'application/octet-stream', upsert: false
    });
    if(error) throw error;
    return meta;
  }
  // offline → IndexedDB
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({ ...meta, recordId, blob: file });
    tx.oncomplete = () => resolve(meta);
    tx.onerror    = () => reject(tx.error);
  });
}
async function fileStore_get(id) {
  if(cloudFiles()) {
    try {
      const { data, error } = await sb.storage.from('attachments').download(filePath(id));
      if(error) throw error;
      return { id, blob: data, type: data.type, name: id };
    } catch(e) { /* fall through to local in case it was stored offline */ }
  }
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror   = () => reject(req.error);
  });
}
async function fileStore_delete(id) {
  if(cloudFiles()) {
    try { await sb.storage.from('attachments').remove([filePath(id)]); } catch(e) {}
  }
  try {
    const db = await openDB();
    await new Promise((resolve) => {
      const tx = db.transaction(STORE, 'readwrite');
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = resolve; tx.onerror = resolve;
    });
  } catch(e) {}
}
async function fileStore_all() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(STORE, 'readonly').objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror   = () => reject(req.error);
  });
}
// Files attached while offline live only in IndexedDB. Once signed in, push any
// that aren't already in cloud storage, then drop the local copy to reclaim space.
async function syncOfflineFilesToCloud() {
  if(!cloudFiles()) return;
  let locals;
  try { locals = await fileStore_all(); } catch(e) { return; }
  if(!locals || !locals.length) return;
  let migrated = 0;
  for(const rec of locals) {
    if(!rec || !rec.blob) continue;
    try {
      const { error } = await sb.storage.from('attachments').upload(
        filePath(rec.id), rec.blob,
        { contentType: rec.type || 'application/octet-stream', upsert: false }
      );
      // An "already exists" error means it's safely in the cloud already — treat as done.
      if(error && !/exist|dupl|409/i.test(error.message || '')) throw error;
      const db = await openDB();
      await new Promise(res => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).delete(rec.id);
        tx.oncomplete = res; tx.onerror = res;
      });
      migrated++;
    } catch(e) { console.error('Offline file migrate failed', rec.id, e); }
  }
  if(migrated) showSync('Synced '+migrated+' offline file'+(migrated>1?'s':'')+' to cloud', 'ok', 2500);
}

function fmtSize(bytes) {
  if(!bytes) return '0 KB';
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return Math.round(bytes/1024) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}
function isImage(type) { return /^image\//.test(type||''); }
function isPdf(type)   { return type === 'application/pdf'; }

// Find attachment metadata (name/type) from state by file id
function findAttachmentMeta(fileId) {
  for(const pet of (state.pets||[])) {
    for(const key of ['vetVisits','vaccinations','healthNotes']) {
      for(const rec of (pet[key]||[])) {
        const a = (rec.attachments||[]).find(x=>x.id===fileId);
        if(a) return a;
      }
    }
  }
  return null;
}

// Open a file: image → lightbox, pdf → new tab, other → download
async function openAttachment(fileId) {
  const meta = findAttachmentMeta(fileId) || {};
  let rec;
  try { rec = await fileStore_get(fileId); } catch(e) { rec = null; }
  if(!rec || !rec.blob) { showSync('File not found — it may not have synced yet', 'err', 3500); return; }
  const type = meta.type || rec.type;
  const name = meta.name || rec.name || 'file';
  const url = URL.createObjectURL(rec.blob);
  if(isImage(type)) {
    openLightbox(url, name);
  } else if(isPdf(type)) {
    window.open(url, '_blank');
  } else {
    const a = document.createElement('a');
    a.href = url; a.download = name; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  }
}
function openLightbox(url, caption) {
  const img = document.getElementById('lightboxImg');
  img.src = url;
  img.alt = caption || 'Attachment preview';
  document.getElementById('lightboxCap').textContent = caption || '';
  const lb = document.getElementById('lightbox');
  lb.classList.add('open');
  lb._url = url;
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  if(lb._url) { setTimeout(()=>URL.revokeObjectURL(lb._url), 200); lb._url = null; }
  document.getElementById('lightboxImg').src = '';
}

// In-memory cache of thumbnail object URLs for image attachments, so re-renders are cheap.
// Bounded + revoked on eviction so blob URLs don't leak over a long session.
const _thumbCache = new Map();
const THUMB_CACHE_MAX = 60;
function clearThumbCache() {
  for(const u of _thumbCache.values()) { try { URL.revokeObjectURL(u); } catch(e) {} }
  _thumbCache.clear();
}
async function getThumb(fileId) {
  if(_thumbCache.has(fileId)) {
    const u = _thumbCache.get(fileId);
    _thumbCache.delete(fileId); _thumbCache.set(fileId, u); // mark as most-recently used
    return u;
  }
  const meta = findAttachmentMeta(fileId) || {};
  let rec;
  try { rec = await fileStore_get(fileId); } catch(e) { rec = null; }
  if(!rec || !rec.blob) return null;
  const type = meta.type || rec.type;
  if(!isImage(type)) return null;
  const url = URL.createObjectURL(rec.blob);
  _thumbCache.set(fileId, url);
  while(_thumbCache.size > THUMB_CACHE_MAX) {
    const oldestKey = _thumbCache.keys().next().value;
    const oldestUrl = _thumbCache.get(oldestKey);
    _thumbCache.delete(oldestKey);
    try { URL.revokeObjectURL(oldestUrl); } catch(e) {}
  }
  return url;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d) {
  if(!d) return '—';
  const dt=new Date(d+'T12:00:00');
  return isNaN(dt)?d:dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtShort(d) {
  if(!d) return '—';
  const dt=new Date(d+'T12:00:00');
  return isNaN(dt)?d:dt.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
}
function petAge(bd) {
  if(!bd) return '—';
  const diff=Date.now()-new Date(bd+'T12:00:00');
  const y=Math.floor(diff/(365.25*864e5));
  const m=Math.floor((diff%(365.25*864e5))/(30.44*864e5));
  if(y<1) return m<1?'< 1 mo':`${m} mo`;
  return `${y} yr${y>1?'s':''} ${m>0?m+' mo':''}`.trim();
}
function daysUntil(d) {
  if(!d) return null;
  return Math.round((new Date(d+'T12:00:00')-new Date())/864e5);
}
function vacStatus(nextDue) {
  const days=daysUntil(nextDue);
  if(days===null) return {label:'No due date',cls:'pill-gray',dot:null};
  if(days<0)   return {label:'Overdue',cls:'pill-red',dot:'dot-red'};
  if(days<=30) return {label:'Due soon',cls:'pill-amber',dot:'dot-amber'};
  return {label:'Current',cls:'pill-green',dot:null};
}
function parasiteStatus(nextDue) {
  const days=daysUntil(nextDue);
  if(days===null) return {label:'No due date',cls:'pill-gray',card:''};
  if(days<0)   return {label:`Overdue by ${Math.abs(days)}d`,cls:'pill-red',card:'overdue'};
  if(days<=14) return {label:`Due in ${days}d`,cls:'pill-amber',card:'due-soon'};
  return {label:`Due ${fmt(nextDue)}`,cls:'pill-green',card:'current'};
}
function medStatusCls(s) {
  return {active:'pill-green',prn:'pill-blue',completed:'pill-gray',discontinued:'pill-red'}[s]||'pill-gray';
}
// Display-only: an 'active' med whose end date has passed shows as 'completed'
// (does NOT rewrite stored data). prn/completed/discontinued are left as-is.
function effectiveMedStatus(m) {
  if(!m) return 'active';
  const s = m.status || 'active';
  if(s === 'active' && m.endDate) {
    const end = new Date(m.endDate + 'T23:59:59');
    if(!isNaN(end) && end < new Date()) return 'completed';
  }
  return s;
}
function visitTypeCls(t) {
  return {annual:'pill-green',checkup:'pill-green',sick:'pill-amber',booster:'pill-blue',dental:'pill-purple',emergency:'pill-red'}[t]||'pill-gray';
}
function speciesBadge(sp) {
  return {Cat:'badge-cat',Dog:'badge-dog',Rabbit:'badge-rabbit',Bird:'badge-bird'}[sp]||'badge-other';
}

// Per-pet status: the dot tier (worst of overdue > due-soon > upcoming) and the
// nearest item worth surfacing. Vaccines & parasites can be overdue (red); vet
// visits are appointments, so only future dates count (amber/green, never red).
// Windows: overdue (<0) red · 0–14d amber · 15–60d green · beyond 60d → no dot.
function petStatus(pet) {
  const t = today();
  const cap = s => s ? s.charAt(0).toUpperCase()+s.slice(1) : s;
  const items = [];
  (pet.vaccinations||[]).forEach(v=>{ const d=daysUntil(v.nextDue); if(d!==null) items.push({d, date:v.nextDue, label:v.name||'Vaccine', overdueable:true}); });
  (pet.parasites||[]).forEach(p=>{ const d=daysUntil(p.nextDue); if(d!==null) items.push({d, date:p.nextDue, label:p.name||'Treatment', overdueable:true}); });
  (pet.vetVisits||[]).forEach(v=>{ if(v.date && v.date>=t){ const d=daysUntil(v.date); if(d!==null) items.push({d, date:v.date, label:cap(v.type||'Vet visit'), overdueable:false}); } });

  const rank = { red:3, amber:2, green:1 };
  const tierOf = it => (it.overdueable && it.d<0) ? 'red' : (it.d>=0 && it.d<=14) ? 'amber' : (it.d>=15 && it.d<=60) ? 'green' : null;

  let tier = null;
  const relevant = [];
  items.forEach(it=>{
    const tr = tierOf(it);
    if(!tr) return;
    if((rank[tr]||0) > (rank[tier]||0)) tier = tr;
    relevant.push(it);
  });
  relevant.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const next = relevant[0] || null;
  return { tier, next, count: relevant.length };
}

// ── PET METRICS (header cards) ────────────────────────────────
// Gather all weights from weight logs + vet visits, sorted chronologically.
function gatherWeights(pet) {
  const pts = [];
  (pet.weightLogs||[]).forEach(w => {
    const val = parseFloat(w.weight);
    if(w.date && val) pts.push({ date:w.date, weight:val, unit:w.unit||'kg', source:'log' });
  });
  (pet.vetVisits||[]).forEach(v => {
    const val = parseFloat(v.weight);
    if(v.date && val) pts.push({ date:v.date, weight:val, unit:v.weightUnit||'kg', source:'vet' });
  });
  return pts.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}

function renderPetMetrics(pet) {
  const weights = gatherWeights(pet);
  const latestW = weights.length ? weights[weights.length-1] : null;

  // Next vaccine or parasite due
  let nextDue = null;
  [...(pet.vaccinations||[]).map(v=>({d:v.nextDue,n:v.name})),
   ...(pet.parasites||[]).map(p=>({d:p.nextDue,n:p.name}))].forEach(x=>{
    const days = daysUntil(x.d);
    if(days===null) return;
    if(!nextDue || days < nextDue.days) nextDue = { days, name:x.n };
  });

  // Last vet visit (past)
  const today_ = today();
  const pastVisits = (pet.vetVisits||[]).filter(v=>v.date && v.date<=today_).sort((a,b)=>b.date.localeCompare(a.date));
  const lastVisit = pastVisits[0] || null;

  const weightCard = latestW
    ? `<div class="mc"><div class="mc-l">Current weight</div><div class="mc-v">${latestW.weight} <small>${esc(latestW.unit)}</small></div></div>`
    : `<div class="mc"><div class="mc-l">Current weight</div><div class="mc-v mc-empty">—</div></div>`;

  let dueCard;
  if(nextDue) {
    const dueText = nextDue.days < 0 ? `${Math.abs(nextDue.days)}d` : nextDue.days===0 ? 'today' : `in ${nextDue.days}`;
    const dueUnit = nextDue.days < 0 ? 'overdue' : (nextDue.days===0 ? '' : 'days');
    const cls = nextDue.days < 0 ? 'mc-danger' : nextDue.days<=14 ? 'mc-warn' : '';
    dueCard = `<div class="mc"><div class="mc-l">Next due</div><div class="mc-v ${cls}">${dueText} <small>${dueUnit}</small></div></div>`;
  } else {
    dueCard = `<div class="mc"><div class="mc-l">Next due</div><div class="mc-v mc-empty">—</div></div>`;
  }

  const visitCard = lastVisit
    ? `<div class="mc"><div class="mc-l">Last visit</div><div class="mc-v">${fmtDayMon(lastVisit.date)}</div></div>`
    : `<div class="mc"><div class="mc-l">Last visit</div><div class="mc-v mc-empty">—</div></div>`;

  return `<div class="pet-metrics">${weightCard}${dueCard}${visitCard}</div>`;
}

function fmtDayMon(d) {
  if(!d) return '—';
  const dt=new Date(d+'T12:00:00');
  if(isNaN(dt)) return d;
  return `${dt.getDate()} <small>${dt.toLocaleDateString('en-GB',{month:'short'})}</small>`;
}

// ── FOOTER SUMMARY (stats + next upcoming) ────────────────────
function renderFooterSummary(pet) {
  // Total records across all categories
  const recordKeys = ['vaccinations','medications','vetVisits','weightLogs','parasites','healthNotes'];
  const totalRecords = recordKeys.reduce((sum,k)=>sum + (pet[k]?.length||0), 0);

  // Active medications
  const activeMeds = (pet.medications||[]).filter(m=>effectiveMedStatus(m)==='active').length;

  // Days since last backup
  const lastExport = localStorage.getItem('petLog_lastExport');
  const backupDays = lastExport ? Math.floor((Date.now()-parseInt(lastExport))/864e5) : null;
  const backupTxt = backupDays===null ? 'never' : backupDays===0 ? 'today' : `${backupDays}`;
  const backupUnit = (backupDays===null || backupDays===0) ? '' : (backupDays===1?'day':'days');
  const backupCls = (backupDays===null || backupDays>=7) ? 'fs-warn' : '';

  // Next upcoming item (any future or overdue due date / scheduled visit), nearest first
  const today_ = today();
  const upcoming = [];
  (pet.vaccinations||[]).forEach(v=>{ if(v.nextDue) upcoming.push({date:v.nextDue, title:`${v.name||'Vaccine'} due`, sub:'Vaccine', tab:'vaccinations'}); });
  (pet.parasites||[]).forEach(p=>{ if(p.nextDue) upcoming.push({date:p.nextDue, title:`${p.name||'Treatment'} due`, sub:p.frequency||'Parasite treatment', tab:'parasites'}); });
  (pet.vetVisits||[]).forEach(v=>{ if(v.date && v.date>=today_) upcoming.push({date:v.date, title:`${(v.type||'Visit').charAt(0).toUpperCase()+(v.type||'Visit').slice(1)}${v.vet?' with '+v.vet:''}`, sub:v.clinic||'Vet visit', tab:'vetVisits'}); });
  upcoming.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const next = upcoming[0] || null;

  let nextRow = '';
  if(next) {
    const dt = new Date(next.date+'T12:00:00');
    const day = isNaN(dt)?'–':String(dt.getDate()).padStart(2,'0');
    const mon = isNaN(dt)?'':dt.toLocaleDateString('en-GB',{month:'short'});
    const d = daysUntil(next.date);
    const whenTxt = d===null ? '' : d<0 ? `${Math.abs(d)}d overdue` : d===0 ? 'today' : `in ${d}d`;
    const whenCls = d!==null && d<0 ? 'fw-overdue' : (d!==null && d<=14 ? 'fw-soon' : '');
    nextRow = `<button type="button" class="fs-next" onclick="switchTab('${next.tab}')" aria-label="Go to ${esc(next.title)}">
      <div class="fs-next-date"><div class="fs-next-d">${day}</div><div class="fs-next-m">${mon}</div></div>
      <div class="fs-next-body">
        <div class="fs-next-t">${esc(next.title)}</div>
        <div class="fs-next-sub">Next up · ${esc(next.sub)}</div>
      </div>
      <span class="fs-when ${whenCls}">${whenTxt}</span>
    </button>`;
  } else {
    nextRow = `<div class="fs-next-empty">Nothing scheduled — add a due date to a vaccine or treatment to see it here.</div>`;
  }

  return `<div class="footer-summary">
    <div class="fs-stats">
      <div class="fs-stat"><div class="fs-v">${totalRecords}</div><div class="fs-l">Records</div></div>
      <div class="fs-stat"><div class="fs-v">${activeMeds}</div><div class="fs-l">Active meds</div></div>
      <div class="fs-stat"><div class="fs-v ${backupCls}">${backupTxt} <small>${backupUnit}</small></div><div class="fs-l">Since backup</div></div>
    </div>
    ${nextRow}
  </div>`;
}

// ── TAB CONTENT ───────────────────────────────────────────────
function renderTabContent(pet) {
  const el=document.getElementById('tabContent'); if(!el) return;
  searchQ='';
  const map={all:allView,vaccinations,medications,vetVisits,weight,parasites,notes};
  el.innerHTML=(map[activeTab]||function(){return '';})(pet);
}

function secToolbar(icon,cls,title,section,btnLabel,showSearch=true) {
  return `<div class="sec-toolbar">
    <div class="sec-title"><div class="s-ic ${cls}">${ic(icon)}</div>${title}</div>
    <div class="sec-right">
      ${showSearch?`<input class="search-input" id="searchBox" placeholder="Search…" oninput="doSearch('${section}')" value="${esc(searchQ)}">`:''}
      <button class="add-row-btn" onclick="openAddModal('${section}')">${ic('plus')} ${btnLabel}</button>
    </div>
  </div>`;
}
function doSearch(section) {
  searchQ=document.getElementById('searchBox')?.value||'';
  renderTabContent(getActivePet());
  // restore focus
  const sb=document.getElementById('searchBox');
  if(sb){sb.focus();sb.setSelectionRange(sb.value.length,sb.value.length);}
}
function emptyState(icon,msg,ctaLabel,ctaSection) {
  const cta = ctaLabel && ctaSection
    ? `<div class="empty-cta"><button class="empty-cta-btn" onclick="openAddModal('${ctaSection}')">${ic('plus')} ${ctaLabel}</button></div>`
    : '';
