}
function noResults() { return `<div class="no-results">No results for "${esc(searchQ)}"</div>`; }
function matches(str) { return String(str||'').toLowerCase().includes(searchQ.toLowerCase()); }

// ── ALL / TIMELINE ────────────────────────────────────────────
const KIND_META = {
  vaccination: { icon:'ti-vaccine',        label:'Vaccine',    cls:'ig', section:'vaccination' },
  medication:  { icon:'ti-pill',           label:'Medication', cls:'ib', section:'medication' },
  vetVisit:    { icon:'ti-stethoscope',    label:'Vet visit',  cls:'it', section:'vetVisit' },
  weightLog:   { icon:'ti-scale',          label:'Weight',     cls:'ia', section:'weightLog' },
  parasite:    { icon:'ti-shield-half',    label:'Parasite',   cls:'iw', section:'parasite' },
  healthNote:  { icon:'ti-clipboard-text', label:'Note',       cls:'inote', section:'healthNote' },
};

function gatherEvents(pet) {
  const events = [];
  (pet.vaccinations||[]).forEach(v => {
    if(!v.dateGiven) return;
    const st = vacStatus(v.nextDue);
    events.push({
      kind:'vaccination', id:v.id, date:v.dateGiven,
      title:v.name||'Vaccination',
      sub:[v.description, v.vet].filter(Boolean).join(' · '),
      meta:v.nextDue?`Next due ${fmt(v.nextDue)}`:'',
      pill:v.nextDue?{label:st.label,cls:st.cls}:null
    });
  });
  (pet.medications||[]).forEach(m => {
    if(!m.startDate && !m.endDate) return;
    events.push({
      kind:'medication', id:m.id, date:m.startDate||m.endDate,
      title:m.name||'Medication',
      sub:[m.dosage, m.frequency, m.purpose].filter(Boolean).join(' · '),
      meta:m.endDate&&m.startDate?`${fmt(m.startDate)} → ${fmt(m.endDate)}`:'',
      pill:{label:effectiveMedStatus(m),cls:medStatusCls(effectiveMedStatus(m))}
    });
  });
  (pet.vetVisits||[]).forEach(v => {
    if(!v.date) return;
    events.push({
      kind:'vetVisit', id:v.id, date:v.date,
      title:v.summary?v.summary.split(/[.\n]/)[0]:`${v.type||'Visit'}`,
      sub:[v.vet, v.clinic].filter(Boolean).join(' · '),
      meta:v.followUp?`Follow-up: ${v.followUp}`:'',
      pill:{label:v.type||'visit',cls:visitTypeCls(v.type)}
    });
  });
  (pet.weightLogs||[]).forEach(w => {
    if(!w.date) return;
    events.push({
      kind:'weightLog', id:w.id, date:w.date,
      title:`${w.weight} ${w.unit||'kg'}`,
      sub:w.notes||'',
      meta:'', pill:null
    });
  });
  (pet.parasites||[]).forEach(p => {
    if(!p.lastDone) return;
    const st=parasiteStatus(p.nextDue);
    events.push({
      kind:'parasite', id:p.id, date:p.lastDone,
      title:p.name||'Treatment',
      sub:[p.type, p.product].filter(Boolean).join(' · '),
      meta:p.frequency?`Frequency: ${p.frequency}`:'',
      pill:p.nextDue?{label:st.label,cls:st.cls}:null
    });
  });
  (pet.healthNotes||[]).forEach(n => {
    if(!n.date) return;
    events.push({
      kind:'healthNote', id:n.id, date:n.date,
      title:(n.text||'').slice(0,140)+((n.text||'').length>140?'…':''),
      sub:'', meta:'',
      pill:n.type&&n.type!=='normal'?{label:n.type,cls:n.type==='good'?'pill-green':'pill-amber'}:null
    });
  });
  return events.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

function withinRange(dateStr) {
  if(dateRange==='all') return true;
  if(!dateStr) return false;
  const d = new Date(dateStr+'T12:00:00');
  if(isNaN(d)) return false;
  if(dateRange==='custom') {
    if(customStart && d < new Date(customStart+'T00:00:00')) return false;
    if(customEnd   && d > new Date(customEnd+'T23:59:59')) return false;
    return true;
  }
  const days = {'7d':7,'30d':30,'90d':90,'365d':365}[dateRange];
  if(!days) return true;
  const cutoff = new Date(); cutoff.setHours(0,0,0,0); cutoff.setDate(cutoff.getDate()-days);
  return d >= cutoff;
}

function setRange(r) { dateRange=r; renderTabContent(getActivePet()); }
function setCustomRange() {
  customStart = document.getElementById('rangeStart').value;
  customEnd   = document.getElementById('rangeEnd').value;
  dateRange = 'custom';
  renderTabContent(getActivePet());
}

function rangeBar() {
  const pills = [
    {id:'all',label:'All time'},
    {id:'7d',label:'7 days'},
    {id:'30d',label:'30 days'},
    {id:'90d',label:'90 days'},
    {id:'365d',label:'1 year'},
  ].map(p=>`<button class="range-pill ${dateRange===p.id?'active':''}" onclick="setRange('${p.id}')">${p.label}</button>`).join('');
  return `<div class="range-bar">
    <span class="range-lbl">Range</span>
    ${pills}
    <span class="range-custom">
      <input type="date" id="rangeStart" value="${customStart}" onchange="setCustomRange()" max="${today()}">
      <span>→</span>
      <input type="date" id="rangeEnd" value="${customEnd}" onchange="setCustomRange()" max="${today()}">
    </span>
  </div>`;
}

function allView(pet) {
  const all = gatherEvents(pet);
  const toolbar = `<div class="sec-toolbar">
    <div class="sec-title"><div class="s-ic iall">${ic('layout-grid')}</div>All activity</div>
    <div class="sec-right">
      <input class="search-input" id="searchBox" placeholder="Search…" oninput="doSearch('all')" value="${esc(searchQ)}">
    </div>
  </div>${rangeBar()}`;
  if(!all.length) return toolbar+emptyState('ti-layout-grid','Nothing logged yet — add a vaccination, vet visit, or note to get started');

  let items = all.filter(e=>withinRange(e.date));
  if(searchQ) items = items.filter(e=>matches(e.title)||matches(e.sub)||matches(e.meta)||matches(KIND_META[e.kind].label));
  if(!items.length) return toolbar+`<div class="no-results">No events in this range${searchQ?` for "${esc(searchQ)}"`:''}.</div>`;

  // group by month
  let html='', curMonth='';
  const today_ = today();
  items.forEach(e => {
    const dt = new Date(e.date+'T12:00:00');
    const monthKey = isNaN(dt) ? 'No date' : dt.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    if(monthKey !== curMonth) {
      html += `<div class="timeline-month">${monthKey}</div>`;
      curMonth = monthKey;
    }
    const km = KIND_META[e.kind];
    const day = isNaN(dt) ? '–' : String(dt.getDate()).padStart(2,'0');
    const monShort = isNaN(dt) ? '' : dt.toLocaleDateString('en-GB',{month:'short'});
    const isUpcoming = e.date >= today_;
    const metaParts = [km.label];
    if(e.sub)  metaParts.push(e.sub);
    if(e.meta) metaParts.push(e.meta);
    const metaText = metaParts.join(' · ');
    html += `<div class="timeline-row">
      <div class="tl-date"><div class="tl-date-inner ${isUpcoming?'upcoming':''}">
        <div class="tl-day">${day}</div>
        <div class="tl-mon">${monShort}</div>
      </div></div>
      <div class="tl-content">
        <div class="tl-title-row">
          <span class="tl-title">${esc(e.title)}</span>
          ${e.pill?`<span class="pill ${e.pill.cls}">${esc(e.pill.label)}</span>`:''}
        </div>
        <div class="tl-meta">${esc(metaText)}</div>
      </div>
      <div class="tl-actions">
        <button class="ra-btn" onclick="openRecordModal('${km.section}','${e.id}')">${ic('edit')}</button>
        <button class="ra-btn del" onclick="confirmDeleteRecord('${km.section}','${e.id}')">${ic('x')}</button>
      </div>
    </div>`;
  });
  return toolbar + html;
}

// ── NEEDS ATTENTION ───────────────────────────────────────────
function needsAttention(pet) {
  const items = [];
  (pet.vaccinations||[]).forEach(v => {
    const d = daysUntil(v.nextDue);
    if(d===null) return;
    if(d<0)        items.push({kind:'overdue', icon:'ti-vaccine', label:`${v.name||'Vaccine'} overdue`,   when:`${Math.abs(d)}d overdue`, days:Math.abs(d), tab:'vaccinations', sortKey:d});
    else if(d<=30) items.push({kind:'soon',    icon:'ti-vaccine', label:`${v.name||'Vaccine'} due`,        when:d===0?'today':`in ${d}d`, days:d, tab:'vaccinations', sortKey:d+1000});
  });
  (pet.parasites||[]).forEach(p => {
    const d = daysUntil(p.nextDue);
    if(d===null) return;
    if(d<0)        items.push({kind:'overdue', icon:'ti-shield-half', label:`${p.name||'Treatment'} overdue`, when:`${Math.abs(d)}d overdue`, days:Math.abs(d), tab:'parasites', sortKey:d});
    else if(d<=14) items.push({kind:'soon',    icon:'ti-shield-half', label:`${p.name||'Treatment'} due`,     when:d===0?'today':`in ${d}d`, days:d, tab:'parasites', sortKey:d+1000});
  });
  (pet.vetVisits||[]).forEach(v => {
    const d = daysUntil(v.date);
    if(d===null) return;
    if(d>=0 && d<=30) items.push({
      kind:'upcoming', icon:'ti-stethoscope',
      label:`${(v.type||'Visit').charAt(0).toUpperCase()+(v.type||'Visit').slice(1)}${v.vet?' · '+v.vet:''}`,
      when:d===0?'today':`in ${d}d`, days:d, tab:'vetVisits', sortKey:d+2000
    });
  });
  return items.sort((a,b)=>a.sortKey-b.sortKey);
}

function renderNeedsAttn(pet) {
  const items = needsAttention(pet);
  if(!items.length) return '';
  const labels = {
    overdue: 'Pet Health · Overdue',
    soon: 'Pet Health · Reminder',
    upcoming: 'Pet Health · Upcoming'
  };
  // Build a "sub" line per item — descriptive context
  const buildSub = (it) => {
    if(it.kind==='overdue')  return `Was due ${it.days} day${it.days===1?'':'s'} ago — tap to update`;
    if(it.kind==='soon')     return it.when==='today' ? 'Due today — tap for details' : `Due ${it.when} — tap for details`;
    if(it.kind==='upcoming') return it.when==='today' ? 'Scheduled for today' : `Scheduled ${it.when}`;
    return '';
  };
  return `<div class="notif-stack">${items.map(i=>`
    <div class="notif-card ${i.kind}" onclick="switchTab('${i.tab}')">
      <div class="notif-icon">${ic(i.icon)}</div>
      <div class="notif-body">
        <div class="notif-meta-row">
          <span class="notif-app">${labels[i.kind]}</span>
          <span class="notif-time">${i.when}</span>
        </div>
        <div class="notif-title">${esc(i.label)}</div>
        <div class="notif-sub">${esc(buildSub(i))}</div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ── VACCINATIONS ──────────────────────────────────────────────
function vaccinations(pet) {
  let items=[...(pet.vaccinations||[])].sort((a,b)=>{
    // overdue/due-soon first, then by date given desc
    const aDays=daysUntil(a.nextDue), bDays=daysUntil(b.nextDue);
    const aUrgent = aDays!==null && aDays<=30 ? 0 : 1;
    const bUrgent = bDays!==null && bDays<=30 ? 0 : 1;
    if(aUrgent!==bUrgent) return aUrgent-bUrgent;
    if(aUrgent===0) return (aDays??99999)-(bDays??99999);
    return (b.dateGiven||'').localeCompare(a.dateGiven||'');
  });
  const toolbar=secToolbar('ti-vaccine','ig','Vaccination record','vaccination','Add vaccine');
  if(!items.length) return toolbar+emptyState('ti-vaccine','No vaccinations logged yet','Add vaccine','vaccination');
  if(searchQ) items=items.filter(v=>matches(v.name)||matches(v.vet)||matches(v.description));
  if(!items.length) return toolbar+noResults();
  const rows=items.map(v=>{
    const st=vacStatus(v.nextDue);
    return `<tr>
      <td><strong>${esc(v.name)}</strong>${v.description?`<div class="td-sub">${esc(v.description)}</div>`:''}</td>
      <td>${fmt(v.dateGiven)}</td><td>${esc(v.vet||'—')}</td>
      <td>${v.nextDue?fmt(v.nextDue):'—'}</td>
      <td><span class="pill ${st.cls}">${st.label}</span></td>
      <td><div class="row-actions">
        <button class="ra-btn" onclick="openRecordModal('vaccination','${v.id}')">${ic('edit')}</button>
        <button class="ra-btn del" onclick="confirmDeleteRecord('vaccination','${v.id}')">${ic('x')}</button>
      </div></td></tr>`;
  }).join('');
  return toolbar+`<div style="overflow-x:auto"><table class="data-table"><thead><tr>
    <th>Vaccine</th><th>Date given</th><th>Administered by</th><th>Next due</th><th>Status</th><th></th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── MEDICATIONS ───────────────────────────────────────────────
function medications(pet) {
  const statusOrder = {active:0, prn:1, completed:2, discontinued:3};
  let items=[...(pet.medications||[])].sort((a,b)=>{
    const sa = statusOrder[effectiveMedStatus(a)] ?? 4;
    const sb = statusOrder[effectiveMedStatus(b)] ?? 4;
    if(sa!==sb) return sa-sb;
    return (b.startDate||'').localeCompare(a.startDate||'');
  });
  const toolbar=secToolbar('ti-pill','ib','Medications','medication','Add medication');
  if(!items.length) return toolbar+emptyState('ti-pill','No medications logged yet','Add medication','medication');
  if(searchQ) items=items.filter(m=>matches(m.name)||matches(m.purpose)||matches(m.status));
  if(!items.length) return toolbar+noResults();
  const rows=items.map(m=>{
    const es=effectiveMedStatus(m);
    const auto = (es!==(m.status||'active')) ? ' title="Auto-completed: end date passed"' : '';
    return `<tr>
    <td><strong>${esc(m.name)}</strong>${m.purpose?`<div class="td-sub">${esc(m.purpose)}</div>`:''}</td>
    <td>${esc(m.dosage||'—')}</td><td>${esc(m.frequency||'—')}</td>
    <td>${m.startDate||m.endDate?`${fmt(m.startDate)}${m.endDate?' – '+fmt(m.endDate):''}` : 'Ongoing'}</td>
    <td><span class="pill ${medStatusCls(es)}"${auto}>${esc(es)}</span></td>
    <td><div class="row-actions">
      <button class="ra-btn" onclick="openRecordModal('medication','${m.id}')">${ic('edit')}</button>
      <button class="ra-btn del" onclick="confirmDeleteRecord('medication','${m.id}')">${ic('x')}</button>
    </div></td></tr>`;
  }).join('');
  return toolbar+`<div style="overflow-x:auto"><table class="data-table"><thead><tr>
    <th>Medication</th><th>Dosage</th><th>Frequency</th><th>Duration</th><th>Status</th><th></th>
  </tr></thead><tbody>${rows}</tbody></table></div>`;
}

// ── VET VISITS ────────────────────────────────────────────────
function vetVisits(pet) {
  let items=[...(pet.vetVisits||[])].sort((a,b)=>{
    // upcoming first (asc), then past (desc), empty dates last
    if(!a.date && !b.date) return 0;
    if(!a.date) return 1;
    if(!b.date) return -1;
    const today_=today();
    const aUp = a.date>=today_, bUp = b.date>=today_;
    if(aUp && !bUp) return -1;
    if(!aUp && bUp) return 1;
    if(aUp && bUp)  return (a.date||'').localeCompare(b.date||'');
    return (b.date||'').localeCompare(a.date||'');
  });
  const toolbar=secToolbar('ti-stethoscope','it','Vet visit history','vetVisit','Log visit');
  if(!items.length) return toolbar+emptyState('ti-stethoscope','No vet visits logged yet','Log visit','vetVisit');
  if(searchQ) items=items.filter(v=>matches(v.vet)||matches(v.clinic)||matches(v.summary)||matches(v.type)||matches(v.followUp));
  if(!items.length) return toolbar+noResults();

  const today_=today();
  // Group by month, with upcoming as its own group
  let html='', curGroup='';
  items.forEach(v=>{
    const dt = v.date ? new Date(v.date+'T12:00:00') : null;
    const isUpcoming = v.date && v.date>=today_;
    const groupKey = !v.date ? 'No date'
                   : isUpcoming ? dt.toLocaleDateString('en-GB',{month:'long',year:'numeric'}) + ' · upcoming'
                   : dt.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
    if(groupKey !== curGroup) {
      html += `<div class="timeline-month">${groupKey}</div>`;
      curGroup = groupKey;
    }
    const day = !dt ? '–' : String(dt.getDate()).padStart(2,'0');
    const monShort = !dt ? '' : dt.toLocaleDateString('en-GB',{month:'short'});

    // Title = first sentence of summary, fallback to capitalized type
    const summary = (v.summary||'').trim();
    let title;
    if(summary) {
      const m = summary.match(/^[^.\n]{1,140}(?:\.|$|\n)/);
      title = m ? m[0].replace(/\.$/,'').trim() : summary.slice(0, 100);
    } else {
      const t = v.type || 'visit';
      title = t.charAt(0).toUpperCase()+t.slice(1)+' visit';
    }

    // Meta: vet · clinic · weight
    const metaParts = [];
    if(v.vet) metaParts.push(v.vet);
    if(v.clinic && v.clinic !== v.vet) metaParts.push(v.clinic);
    if(v.weight) metaParts.push(v.weight + ' ' + (v.weightUnit||'kg'));
    const metaText = metaParts.join(' · ');

    // Note: show full summary if it differs from title; with 3-line truncation
    const restOfSummary = summary && summary.length > title.length+5 ? summary : '';
    const noteId = 'note_'+v.id;
    const noteHtml = restOfSummary ? `
      <div class="tl-note" id="${noteId}">${esc(restOfSummary)}</div>
      <button class="tl-expand" onclick="toggleNote('${noteId}', this)">Read more ↓</button>` : '';

    // Attachments
    const atts = v.attachments || [];
    const attsHtml = atts.length ? `<div class="attach-row">${atts.map(a=>{
      const safe = esc(a.name);
      const chipIcon = isImage(a.type)?'photo':isPdf(a.type)?'file-text':'paperclip';
      const short = a.name.length>22 ? a.name.slice(0,20)+'…' : a.name;
      return `<span class="attach-chip" onclick="event.stopPropagation();openAttachment('${a.id}')" title="${safe}"><span class="ac-ic">${ic(chipIcon)}</span>${esc(short)}</span>`;
    }).join('')}</div>` : '';

    // Follow-up
    const followupHtml = v.followUp ? `<div class="tl-followup">Follow-up: ${esc(v.followUp)}</div>` : '';

    html += `<div class="timeline-row">
      <div class="tl-date"><div class="tl-date-inner ${isUpcoming?'upcoming':''}">
        <div class="tl-day">${day}</div>
        <div class="tl-mon">${monShort}</div>
      </div></div>
      <div class="tl-content">
        <div class="tl-title-row">
          <span class="tl-title">${esc(title)}</span>
          ${v.type?`<span class="pill ${visitTypeCls(v.type)}">${esc(v.type)}</span>`:''}
        </div>
        ${metaText?`<div class="tl-meta">${esc(metaText)}</div>`:''}
        ${noteHtml}
        ${attsHtml}
        ${followupHtml}
      </div>
      <div class="tl-actions">
        <button class="ra-btn" onclick="openRecordModal('vetVisit','${v.id}')">${ic('edit')}</button>
        <button class="ra-btn del" onclick="confirmDeleteRecord('vetVisit','${v.id}')">${ic('x')}</button>
      </div>
    </div>`;
  });
  return toolbar + html;
}

// Toggle inline note expansion
function toggleNote(id, btn) {
  const el = document.getElementById(id);
  if(!el) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? 'Read less ↑' : 'Read more ↓';
}

// ── WEIGHT ────────────────────────────────────────────────────
function weight(pet) {
  const toolbar=secToolbar('ti-scale','ia','Weight','weightLog','Log weight',false);
  const allPts = gatherWeights(pet);             // logs + vet visits, chronological
  const logItems=[...(pet.weightLogs||[])].sort((a,b)=>(b.date||'').localeCompare(a.date||'')); // newest first for list
  if(!allPts.length) return toolbar+emptyState('ti-scale','No weight entries yet','Log weight','weightLog');

  const unit = allPts[allPts.length-1].unit || 'kg';
  const latest = allPts[allPts.length-1];
  const vals = allPts.map(p=>p.weight);
  const lowest = Math.min(...vals);

  // 90-day change: compare latest to the earliest point within ~90 days before it
  const latestDate = new Date(latest.date+'T12:00:00');
  const cutoff = new Date(latestDate); cutoff.setDate(cutoff.getDate()-90);
  const within = allPts.filter(p=>new Date(p.date+'T12:00:00') >= cutoff);
  const baseline = within.length>1 ? within[0] : (allPts.length>1 ? allPts[0] : null);
  const change = baseline ? (latest.weight - baseline.weight) : null;
  const chgCls = change===null ? '' : change>0 ? 'mc-warn' : change<0 ? 'mc-danger' : '';
  const chgTxt = change===null ? '—' : `${change>0?'+':''}${change.toFixed(1)}`;

  const metrics=`<div class="metrics-grid">
    <div class="mc"><div class="mc-l">Current</div><div class="mc-v">${latest.weight} <small>${unit}</small></div></div>
    <div class="mc"><div class="mc-l">Change (90d)</div><div class="mc-v ${chgCls}">${chgTxt} <small>${change===null?'':unit}</small></div></div>
    <div class="mc"><div class="mc-l">Lowest</div><div class="mc-v">${lowest} <small>${unit}</small></div></div>
  </div>`;

  const chart = weightChartSVG(allPts, unit);

  const legend = `<div class="wchart-legend">
    <span><span class="lg-dot" style="background:#BA7517"></span>Weight log</span>
    <span><span class="lg-dot" style="background:#1d9e75"></span>From vet visits</span>
  </div>`;

  // Entry list (manual weight logs only — vet weights are edited on the vet visit)
  let list = '';
  if(logItems.length) {
    list = `<div class="wlist">${logItems.map(w=>`
      <div class="wlist-row">
        <div class="wlist-date">${fmt(w.date)}</div>
        <div class="wlist-val">${esc(w.weight)} <small>${esc(w.unit||'kg')}</small></div>
        ${w.notes?`<div class="wlist-note">${esc(w.notes)}</div>`:'<div class="wlist-note"></div>'}
        <div class="w-acts">
          <button class="ra-btn" onclick="openRecordModal('weightLog','${w.id}')">${ic('edit')}</button>
          <button class="ra-btn del" onclick="confirmDeleteRecord('weightLog','${w.id}')">${ic('x')}</button>
        </div>
      </div>`).join('')}</div>`;
  } else {
    list = `<div class="wlist-empty">All weights shown come from vet visits. Use “Log weight” to add a standalone entry.</div>`;
  }

  return toolbar + metrics + legend + `<div class="wchart-wrap">${chart}</div>` + list;
}

// Hand-built responsive SVG line chart (no external library)
function weightChartSVG(pts, unit) {
  if(pts.length < 1) return '';
  const W = 640, H = 200, padL = 38, padR = 14, padT = 16, padB = 28;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const vals = pts.map(p=>p.weight);
  let minV = Math.min(...vals), maxV = Math.max(...vals);
  if(minV === maxV) { minV -= 0.5; maxV += 0.5; }   // flat line padding
  const range = maxV - minV;
  minV -= range*0.12; maxV += range*0.12;            // headroom
  const span = maxV - minV;

  const n = pts.length;
  const x = i => n===1 ? padL+innerW/2 : padL + (i/(n-1))*innerW;
  const y = v => padT + (1-(v-minV)/span)*innerH;

  // Y gridlines (3)
  let grid='';
  for(let g=0; g<=2; g++){
    const gv = minV + (span*g/2);
    const gy = y(gv);
    grid += `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" class="wc-grid"/>`;
    grid += `<text x="${padL-7}" y="${(gy+3).toFixed(1)}" class="wc-axis" text-anchor="end">${gv.toFixed(1)}</text>`;
  }

  // Area + line path
  const linePts = pts.map((p,i)=>`${x(i).toFixed(1)},${y(p.weight).toFixed(1)}`);
  const linePath = 'M' + linePts.join(' L');
  const areaPath = `M${x(0).toFixed(1)},${y(pts[0].weight).toFixed(1)} L` + linePts.join(' L') +
                   ` L${x(n-1).toFixed(1)},${(padT+innerH).toFixed(1)} L${x(0).toFixed(1)},${(padT+innerH).toFixed(1)} Z`;

  // X labels: first, middle, last (avoid crowding)
  const labelIdx = n<=3 ? pts.map((_,i)=>i) : [0, Math.floor((n-1)/2), n-1];
  let xlabels='';
  labelIdx.forEach(i=>{
    const dt = new Date(pts[i].date+'T12:00:00');
    const lbl = isNaN(dt)?'' : dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
    const anchor = i===0?'start':i===n-1?'end':'middle';
    xlabels += `<text x="${x(i).toFixed(1)}" y="${H-8}" class="wc-axis" text-anchor="${anchor}">${lbl}</text>`;
  });

  // Points, colored by source, with hover tooltip via <title>
  const dots = pts.map((p,i)=>{
    const c = p.source==='vet' ? '#1d9e75' : '#BA7517';
    const dt = new Date(p.date+'T12:00:00');
    const dlbl = isNaN(dt)?p.date:dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
    const src = p.source==='vet'?'vet visit':'logged';
    return `<circle cx="${x(i).toFixed(1)}" cy="${y(p.weight).toFixed(1)}" r="4" fill="${c}" stroke="var(--surface)" stroke-width="1.5"><title>${p.weight} ${unit} · ${dlbl} (${src})</title></circle>`;
  }).join('');

  return `<svg viewBox="0 0 ${W} ${H}" class="wchart" preserveAspectRatio="none" role="img" aria-label="Weight trend chart">
    ${grid}
    <path d="${areaPath}" class="wc-area"/>
    <path d="${linePath}" class="wc-line"/>
    ${dots}
    ${xlabels}
  </svg>`;
}

// ── PARASITE TRACKER ──────────────────────────────────────────
function parasites(pet) {
  let items=[...(pet.parasites||[])].sort((a,b)=>{
    // overdue (negative days, biggest first), due-soon (0-14 days), current (>14 days), no-due last
    const ad=daysUntil(a.nextDue), bd=daysUntil(b.nextDue);
    const rank = d => d===null ? 3 : d<0 ? 0 : d<=14 ? 1 : 2;
    const ra=rank(ad), rb=rank(bd);
    if(ra!==rb) return ra-rb;
    if(ad===null && bd===null) return (b.lastDone||'').localeCompare(a.lastDone||'');
    return (ad??0)-(bd??0);
  });
  const toolbar=secToolbar('ti-shield-half','iw','Parasite treatment tracker','parasite','Add treatment');
  if(!items.length) return toolbar+emptyState('ti-shield-half','No parasite treatments logged yet','Add treatment','parasite');
  if(searchQ) items=items.filter(p=>matches(p.name)||matches(p.type)||matches(p.product));
  if(!items.length) return toolbar+noResults();
  const cards=items.map(p=>{
    const st=parasiteStatus(p.nextDue);
    return `<div class="parasite-card ${st.card}">
      <div class="parasite-actions">
        <button class="ra-btn" onclick="openRecordModal('parasite','${p.id}')">${ic('edit')}</button>
        <button class="ra-btn del" onclick="confirmDeleteRecord('parasite','${p.id}')">${ic('x')}</button>
      </div>
      <div class="p-type">${esc(p.type||'Treatment')}</div>
      <div class="p-name">${esc(p.name)}</div>
      ${p.product?`<div class="p-detail"><span>Product</span><span>${esc(p.product)}</span></div>`:''}
      ${p.lastDone?`<div class="p-detail"><span>Last done</span><span>${fmt(p.lastDone)}</span></div>`:''}
      ${p.frequency?`<div class="p-detail"><span>Frequency</span><span>${esc(p.frequency)}</span></div>`:''}
      <div class="p-status"><span class="pill ${st.cls}">${st.label}</span></div>
    </div>`;
  }).join('');
  return toolbar+`<div class="parasite-grid">${cards}</div>`;
}

// ── PRINT ─────────────────────────────────────────────────────
function printView() {
  const pet=getActivePet(); if(!pet) return;
  const esc2 = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const today_ = today();
  const dm = d => { if(!d) return ''; const t=new Date(d+'T12:00:00'); return isNaN(t)?d:t.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };

  // ---- Profile / care ----
  const weights = gatherWeights(pet);
  const curW = weights.length ? `${weights[weights.length-1].weight} ${weights[weights.length-1].unit||'kg'}` : '—';
  const profileRows = [
    ['Species', [pet.species, pet.breed].filter(Boolean).join(' · ') || '—'],
    ['Sex', pet.sex || '—'],
    ['Age', pet.birthdate ? `${petAge(pet.birthdate)} (b. ${dm(pet.birthdate)})` : '—'],
    ['Microchip', pet.microchip || '—'],
  ];
  const careRows = [
    ['Primary vet', pet.vet || '—'],
    ['Current weight', curW],
    ['Insurance', pet.insurance || '—'],
  ];

  // ---- Stats ----
  const totalRecords = ['vaccinations','medications','vetVisits','weightLogs','parasites','healthNotes'].reduce((s,k)=>s+(pet[k]?.length||0),0);
  const activeMeds = (pet.medications||[]).filter(m=>effectiveMedStatus(m)==='active').length;
  let wTrend = '—';
  if(weights.length>1) {
    const last=weights[weights.length-1], first=weights.find(p=>{const c=new Date(last.date+'T12:00:00');c.setDate(c.getDate()-90);return new Date(p.date+'T12:00:00')>=c;})||weights[0];
    wTrend = `${first.weight} → ${last.weight}`;
  } else if(weights.length===1) wTrend = `${weights[0].weight} ${weights[0].unit||'kg'}`;
  const pastVisits = (pet.vetVisits||[]).filter(v=>v.date&&v.date<=today_).sort((a,b)=>b.date.localeCompare(a.date));
  const lastVisit = pastVisits[0] ? dm(pastVisits[0].date).replace(/ \d{4}$/,'') : '—';

  // ---- Upcoming & due ----
  const up=[];
  (pet.vaccinations||[]).forEach(v=>{ if(v.nextDue) up.push({d:v.nextDue,t:`${v.name||'Vaccine'}`,sub:'vaccine'}); });
  (pet.parasites||[]).forEach(p=>{ if(p.nextDue) up.push({d:p.nextDue,t:`${p.name||'Treatment'}`,sub:p.frequency||'parasite treatment'}); });
  (pet.vetVisits||[]).forEach(v=>{ if(v.date&&v.date>=today_) up.push({d:v.date,t:`${(v.type||'Visit')} — ${v.vet||'vet'}`,sub:'appointment'}); });
  up.sort((a,b)=>(a.d||'').localeCompare(b.d||''));
  const upRows = up.map(u=>{
    const days=daysUntil(u.d);
    let cls='', txt=dm(u.d);
    if(days!==null){ if(days<0){cls='over';txt=`${Math.abs(days)}d overdue`;} else if(days<=14){cls='warn';txt=`due ${dm(u.d)}`;} }
    return `<div class="pl"><span>${esc2(u.t)} <span class="sub">· ${esc2(u.sub)}</span></span><span class="r ${cls}">${esc2(txt)}</span></div>`;
  }).join('') || '<div class="pl"><span class="sub">Nothing scheduled</span></div>';

  // ---- Medications: FULL history, active first ----
  const order={active:0,prn:1,completed:2,discontinued:3};
  const meds=[...(pet.medications||[])].sort((a,b)=>{const s=(order[effectiveMedStatus(a)]??4)-(order[effectiveMedStatus(b)]??4);return s!==0?s:(b.startDate||'').localeCompare(a.startDate||'');});
  const medTagCls = {active:'t-green',prn:'t-blue',completed:'t-gray',discontinued:'t-red'};
  const medRows = meds.map(m=>{
    const range=[m.startDate?dm(m.startDate):'',m.endDate?dm(m.endDate):''].filter(Boolean).join(' → ');
    const detail=[m.dosage,m.frequency,m.purpose].filter(Boolean).join(' · ');
    const es=effectiveMedStatus(m);
    return `<div class="pl"><span><b>${esc2(m.name||'Medication')}</b>${detail?` — ${esc2(detail)}`:''} <span class="tag ${medTagCls[es]||'t-gray'}">${esc2(es)}</span></span><span class="r">${esc2(range)}</span></div>`;
  }).join('') || '<div class="pl"><span class="sub">No medications recorded</span></div>';

  // ---- Vet visits: FULL notes, no truncation ----
  const visits=[...(pet.vetVisits||[])].sort((a,b)=>{
    if(!a.date&&!b.date)return 0; if(!a.date)return 1; if(!b.date)return -1;
    const au=a.date>=today_,bu=b.date>=today_;
    if(au&&!bu)return -1; if(!au&&bu)return 1; if(au&&bu)return a.date.localeCompare(b.date);
    return b.date.localeCompare(a.date);
  });
  const visitEntries = visits.map(v=>{
    const meta=[v.vet,v.clinic&&v.clinic!==v.vet?v.clinic:'',v.weight?`${v.weight} ${v.weightUnit||'kg'}`:''].filter(Boolean).join(' · ');
    const typeCls = {annual:'t-green',checkup:'t-green',sick:'t-amber',booster:'t-blue',dental:'t-purple',emergency:'t-red'}[(v.type||'').toLowerCase()]||'t-gray';
    return `<div class="v-entry">
      <div class="v-top"><span class="v-date">${esc2(dm(v.date))}</span>${v.type?`<span class="v-type ${typeCls}">${esc2(v.type)}</span>`:''}${meta?`<span class="v-meta">${esc2(meta)}</span>`:''}</div>
      ${v.summary?`<div class="v-note">${esc2(v.summary)}</div>`:''}
      ${v.followUp?`<div class="v-fu">Follow-up: ${esc2(v.followUp)}</div>`:''}
    </div>`;
  }).join('') || '<div class="pl"><span class="sub">No vet visits recorded</span></div>';

  const win=window.open('','_blank');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${esc2(pet.name)} — Health Record</title>
  <style>
    @page { margin: 16mm; }
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif; color:#1a1a1a; font-size:12px; line-height:1.5; margin:0; }
    .head { display:flex; align-items:baseline; justify-content:space-between; border-bottom:2px solid #1a1a1a; padding-bottom:8px; margin-bottom:14px; }
    .title { font-size:20px; font-weight:700; } .title small { font-weight:500; color:#666; font-size:13px; margin-left:6px; }
    .date { font-size:11px; color:#888; }
    .row { display:flex; gap:28px; margin-bottom:16px; } .col { flex:1; }
    .sec { font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#999; margin-bottom:6px; }
    .kv { font-size:12px; line-height:1.7; } .kv b { font-weight:600; display:inline-block; min-width:90px; }
    .stats { display:flex; border:1px solid #ddd; border-radius:6px; overflow:hidden; margin-bottom:16px; }
    .stat { flex:1; padding:9px 11px; border-right:1px solid #eee; } .stat:last-child{border-right:none;}
    .stat-v { font-size:16px; font-weight:700; } .stat-l { font-size:9.5px; color:#888; margin-top:2px; }
    .block { margin-bottom:16px; }
    .pl { display:flex; justify-content:space-between; font-size:12px; padding:5px 0; border-bottom:.5px solid #eee; gap:14px; }
    .pl:last-child { border-bottom:none; } .pl .sub { color:#999; } .pl .r { color:#666; white-space:nowrap; text-align:right; }
    .pl .r.warn { color:#b8860b; font-weight:600; } .pl .r.over { color:#c0392b; font-weight:600; }
    .tag { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.03em; border:1px solid #ccc; border-radius:10px; padding:0 6px; color:#666; margin-left:4px; }
    .v-entry { padding:10px 0; border-bottom:.5px solid #eee; break-inside:avoid; page-break-inside:avoid; }
    .v-entry:last-child { border-bottom:none; }
    .v-top { display:flex; align-items:baseline; gap:8px; margin-bottom:3px; }
    .v-date { font-size:13px; font-weight:700; } .v-meta { font-size:11px; color:#777; margin-left:auto; }
    .v-type { font-size:9px; font-weight:600; text-transform:uppercase; letter-spacing:.04em; padding:2px 8px; border-radius:10px; border:none; }
    .v-type.t-green { background:#eaf3de; color:#3b6d11; }
    .v-type.t-amber { background:#faeeda; color:#854f0b; }
    .v-type.t-blue  { background:#e6f1fb; color:#185fa5; }
    .v-type.t-purple{ background:#eeedfe; color:#3c3489; }
    .v-type.t-red   { background:#fcebeb; color:#b8312f; }
    .v-type.t-gray  { background:#f0ede6; color:#5f5e5a; }
    .tag.t-green { background:#eaf3de; color:#3b6d11; border:none; }
    .tag.t-blue  { background:#e6f1fb; color:#185fa5; border:none; }
    .tag.t-gray  { background:#f0ede6; color:#5f5e5a; border:none; }
    .tag.t-red   { background:#fcebeb; color:#b8312f; border:none; }
    @media print { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .v-note { font-size:11.5px; color:#333; line-height:1.55; margin-top:3px; }
    .v-fu { font-size:11px; color:#555; margin-top:5px; padding-left:9px; border-left:2px solid #ccc; }
    .foot { margin-top:18px; padding-top:10px; border-top:.5px solid #ddd; font-size:10px; color:#aaa; text-align:center; }
    h2.bsec { font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#999; margin:0 0 8px; }
  </style></head><body>
    <div class="head"><div class="title">${esc2(pet.name)} <small>health record</small></div><div class="date">${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</div></div>
    <div class="row">
      <div class="col"><div class="sec">Profile</div><div class="kv">${profileRows.map(r=>`<div><b>${r[0]}</b> ${esc2(r[1])}</div>`).join('')}</div></div>
      <div class="col"><div class="sec">Care</div><div class="kv">${careRows.map(r=>`<div><b>${r[0]}</b> ${esc2(r[1])}</div>`).join('')}</div></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-v">${totalRecords}</div><div class="stat-l">Total records</div></div>
      <div class="stat"><div class="stat-v">${activeMeds}</div><div class="stat-l">Active meds</div></div>
      <div class="stat"><div class="stat-v">${esc2(wTrend)}</div><div class="stat-l">Weight (90d)</div></div>
      <div class="stat"><div class="stat-v">${esc2(lastVisit)}</div><div class="stat-l">Last visit</div></div>
    </div>
    <div class="block"><h2 class="bsec">Upcoming &amp; due</h2>${upRows}</div>
    <div class="block"><h2 class="bsec">Medication history</h2>${medRows}</div>
    <div class="block"><h2 class="bsec">Vet visits — full history</h2>${visitEntries}</div>
    <div class="foot">Generated from Pet Health Log · lopstudio.github.io/pet-records</div>
  </body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 250);
}

function handlePhotoUpload(input){
  const file=input.files[0]; if(!file) return;
  if(file.size>10*1024*1024){showSync('Photo too large (max 10 MB)', 'err', 3000);input.value='';return;}
  if(!/^image\//.test(file.type)){showSync('Please choose an image file', 'err', 3000);input.value='';return;}
  const fr=new FileReader();
  fr.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      // Square-crop center, then downscale to max 400px — keeps avatars small in localStorage
      const MAX=400;
      const side=Math.min(img.width,img.height);
      const sx=(img.width-side)/2, sy=(img.height-side)/2;
      const out=Math.min(MAX,side);
      const canvas=document.createElement('canvas');
      canvas.width=out; canvas.height=out;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img, sx,sy,side,side, 0,0,out,out);
      // JPEG @ 0.85 quality — typically 20-60 KB for 400x400
      const d=canvas.toDataURL('image/jpeg',0.85);
      document.getElementById('f_photo').value=d;
      document.getElementById('photoUploadArea').innerHTML=`<img class="photo-preview" src="${d}"><div style="font-size:12px;color:var(--text-2)">Click to change</div><button class="photo-remove-btn" onclick="removePhoto(event)">${ic('x')} Remove</button>`;
    };
    img.onerror=()=>{showSync('Could not read this image — try another', 'err', 3500);};
    img.src=e.target.result;
  };
  fr.onerror=()=>{showSync('Could not read the file', 'err', 3000);};
  fr.readAsDataURL(file);
}

async function handleAttachmentUpload(input) {
  const file = input.files[0];
  if(!file) return;
  if(file.size > MAX_FILE_BYTES) { showSync('File too large. Max '+fmtSize(MAX_FILE_BYTES)+' per file', 'err', 3000); input.value=''; return; }
  if(!modalCtx.attachments) modalCtx.attachments = [];
  if(!modalCtx._newIds) modalCtx._newIds = [];
  try {
    const meta = await fileStore_put(file);
    modalCtx.attachments.push(meta);
    modalCtx._newIds.push(meta.id);
    renderAttachmentList();
  } catch(e) {
    console.error(e);
    showSync('Could not save the file: ' + (e?.message || 'unknown error'), 'err', 4000);
  }
  input.value = '';
}

async function removeAttachment(fileId) {
  if(!modalCtx.attachments) return;
  const idx = modalCtx.attachments.findIndex(a => a.id === fileId);
  if(idx < 0) return;
  modalCtx.attachments.splice(idx, 1);
  const newIdx = (modalCtx._newIds||[]).indexOf(fileId);
  if(newIdx >= 0) {
    modalCtx._newIds.splice(newIdx, 1);
    try { await fileStore_delete(fileId); } catch(e) {}
  } else {
    if(!modalCtx._toRemove) modalCtx._toRemove = [];
    modalCtx._toRemove.push(fileId);
  }
  renderAttachmentList();
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => resolve(fr.result.split(',')[1]);  // strip data URL prefix
    fr.onerror = () => reject(fr.error);
    fr.readAsDataURL(blob);
  });
}
function base64ToBlob(b64, type) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type });
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

function exportData(includeFiles){
  if(!includeFiles) {
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    downloadBlob(blob, `pet-health-backup-${today()}.json`);
    localStorage.setItem('petLog_lastExport',Date.now().toString());
    closeExportMenu(); renderAll();
    return;
  }
  // Full backup: include files inlined as base64
  (async () => {
    try {
      const files = await fileStore_all();
      const totalSize = files.reduce((s,f)=>s+(f.size||0),0);
      if(totalSize > 50*1024*1024) {
        const okBig = await showConfirm({ title:'Large backup', message:`This full backup is about ${fmtSize(totalSize)} and may take a moment to build.`, confirmText:'Continue', icon:'download' });
        if(!okBig) { closeExportMenu(); return; }
      }
      const _files = {};
      for(const f of files) {
        _files[f.id] = { name: f.name, type: f.type, size: f.size, data: await blobToBase64(f.blob) };
      }
      const payload = { ...state, _files };
      const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
      downloadBlob(blob, `pet-health-full-backup-${today()}.json`);
      localStorage.setItem('petLog_lastExport', Date.now().toString());
      closeExportMenu(); renderAll();
    } catch(e) {
      console.error(e);
      showSync('Could not create backup: ' + (e?.message || ''), 'err', 4000);
      closeExportMenu();
    }
  })();
}

function toggleExportMenu(ev) {
  ev?.stopPropagation();
  refreshAccountMenu();
  document.getElementById('exportMenu').classList.toggle('open');
}
function closeExportMenu() { document.getElementById('exportMenu')?.classList.remove('open'); }

function importData(input){
  const file=input.files[0]; if(!file) return;
  const fr=new FileReader();
  fr.onload=async e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!imp.pets) throw new Error('Invalid backup');
      const hasFiles = imp._files && Object.keys(imp._files).length>0;
      const fileCount = hasFiles ? Object.keys(imp._files).length : 0;
      const detail = `${imp.pets.length} pet${imp.pets.length!==1?'s':''}${hasFiles?' and '+fileCount+' file'+(fileCount!==1?'s':''):''}`;
      const okImp = await showConfirm({ title:'Replace all data?', message:`This replaces everything currently in the app with the backup (${detail}). This can\u2019t be undone.`, confirmText:'Replace', tone:'danger', icon:'upload' });
      if(!okImp){input.value='';return;}
      // Restore files first
      if(hasFiles) {
        for(const [id, f] of Object.entries(imp._files)) {
          const blob = base64ToBlob(f.data, f.type);
          const db = await openDB();
          await new Promise((res,rej)=>{
            const tx = db.transaction(STORE,'readwrite');
            tx.objectStore(STORE).put({ id, name: f.name, type: f.type, size: f.size, addedAt: Date.now(), blob });
            tx.oncomplete = res; tx.onerror = ()=>rej(tx.error);
          });
        }
        delete imp._files;
      }
      state=imp;
      state.pets.forEach(p=>{ if(!p.parasites) p.parasites=[]; });
      if(!state.activePetId&&state.pets.length) state.activePetId=state.pets[0].id;
      _thumbCache.size && clearThumbCache();
      saveState();renderAll();showSync('Backup restored', 'ok', 2500);
    }catch(err){ console.error(err); showSync('Invalid backup file: '+(err?.message||''), 'err', 4000); }
    input.value='';
  };
  fr.readAsText(file);
}

// ── AUTH + BOOT ───────────────────────────────────────────────
let cacheHadData = false;   // set true at boot if local cache already had pets

function ensureSeedAndMigrate() {
  if(!state.pets || state.pets.length===0) state = JSON.parse(JSON.stringify(SEED_DATA));
  state.pets.forEach(p=>{ if(!p.parasites) p.parasites=[]; });
  if(!state.activePetId && state.pets.length) state.activePetId = state.pets[0].id;
}

function showApp() {
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('appShell').style.display = '';
  applyDark();
  renderAll();
}

async function sendMagicLink() {
  const email = document.getElementById('authEmail').value.trim();
  const msg = document.getElementById('authMsg');
  const btn = document.getElementById('authSendBtn');
  if(!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) {
    msg.className='auth-msg err'; msg.textContent='Please enter a valid email address.'; return;
  }
  if(!sb) { msg.className='auth-msg err'; msg.textContent='Cloud service unavailable. Try the offline option below.'; return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  msg.className='auth-msg'; msg.textContent='';
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href.split('#')[0] }
    });
    if(error) throw error;
    msg.className='auth-msg ok';
    msg.textContent='Check your inbox — tap the link in the email to sign in. You can close this tab; the link opens the app.';
    btn.textContent = 'Link sent ✓';
  } catch(e) {
    console.error(e);
    msg.className='auth-msg err';
    msg.textContent = 'Couldn\u2019t send the link: ' + (e?.message || 'unknown error');
    btn.disabled = false; btn.textContent = 'Email me a sign-in link';
  }
}

function useOfflineMode() {
  offlineMode = true;
  ensureSeedAndMigrate();
  showApp();
  showSync('Offline mode — this device only', '', 4000);
}

async function onSignedIn(user) {
  currentUser = user;
  document.getElementById('authGate').style.display = 'none';
  // Pull cloud copy
  const cloud = await pullFromCloud();
  const localHasData = cacheHadData && state.pets && state.pets.length>0;

  if(cloud && cloud.pets && cloud.pets.length>0) {
    // Cloud is source of truth
    state = cloud;
    ensureSeedAndMigrate();
    syncReady = true;
    showApp();
    showSync('Synced', 'ok', 1500);
  } else if(cloud === undefined) {
    // Cloud unreachable — show local cache, will retry on next save
    ensureSeedAndMigrate();
    syncReady = false;
    showApp();
  } else {
    // Cloud empty (first time on this account). Migrate local data up if present.
    if(localHasData) {
      ensureSeedAndMigrate();
      syncReady = true;
      showApp();
      await pushToCloud();
      showSync('Your existing data is now synced', 'ok', 3000);
    } else {
      ensureSeedAndMigrate();   // fresh account → seed
      syncReady = true;
      showApp();
      await pushToCloud();
    }
  }
  // Push up any attachments that were added while offline on this device
  if(syncReady) syncOfflineFilesToCloud();
}

async function boot() {
  loadState();              // instant cache load (state + darkMode)
  cacheHadData = !!(state.pets && state.pets.length>0);
  const ok = initSupabase();

  if(!ok) {
    // Library failed to load — fall back to local-only, no gate
    document.getElementById('authSub').textContent = 'Cloud service couldn\u2019t load. You can still use the app offline on this device.';
    return; // gate stays; user taps "Continue offline"
  }

  // Handle the magic-link return (tokens land in URL hash) + existing session
  try {
    const { data: { session } } = await sb.auth.getSession();
    if(session && session.user) {
      await onSignedIn(session.user);
    }
  } catch(e) { console.error(e); }

  // React to auth changes (e.g. clicking the emailed link)
  sb.auth.onAuthStateChange((event, session) => {
    if(session && session.user && !currentUser) {
      onSignedIn(session.user);
    }
  });
}

async function signOut() {
  if(sb && currentUser) { try { await sb.auth.signOut(); } catch(e){} }
  location.reload();
}

async function accountAction() {
  closeExportMenu();
  if(offlineMode || !currentUser) {
    // Offline: offer to sign in for sync
    const ok = await showConfirm({ title:'Sign in to sync?', message:'Your current data will be uploaded to your account and synced across your devices.', confirmText:'Sign in', icon:'cloud-upload' });
    if(ok) location.reload();
  } else {
    const ok = await showConfirm({ title:'Sign out?', message:'Your data stays safe in the cloud. You can sign back in any time.', confirmText:'Sign out', icon:'logout' });
    if(ok) signOut();
  }
}

function refreshAccountMenu() {
  const t=document.getElementById('accountMenuTitle'), s=document.getElementById('accountMenuSub');
  if(!t||!s) return;
  if(offlineMode || !currentUser) { t.textContent='Sign in to sync'; s.textContent='Offline — this device only'; }
  else { t.textContent='Sign out'; s.textContent=currentUser.email||'Synced to cloud'; }
}

boot();

// Esc closes any open overlay
document.addEventListener('keydown', e => {
  if(e.key!=='Escape') return;
  if(document.getElementById('confirmOverlay').classList.contains('open')) { _closeConfirm(false); return; }
  if(document.getElementById('lightbox').classList.contains('open')) { closeLightbox(); return; }
  if(document.getElementById('modalOverlay').classList.contains('open')) closeModal();
  closeExportMenu();
});
// Click outside closes export menu
document.addEventListener('click', e => {
  const menu = document.getElementById('exportMenu');
  if(menu && menu.classList.contains('open') && !menu.contains(e.target) && !e.target.closest('button')?.getAttribute('onclick')?.includes('toggleExportMenu')) {
    closeExportMenu();
  }
});
